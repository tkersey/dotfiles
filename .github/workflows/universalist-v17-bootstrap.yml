name: Package Universalist base tree

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 5581cbc948af79683c5cff9db2a447ecbc930d87
          show-progress: false

      - name: Build complete base archive
        run: |
          mkdir -p /tmp/universalist-base
          cp -R codex /tmp/universalist-base/
          find /tmp/universalist-base/codex/agents \
            -maxdepth 1 -type f ! -name 'universalist-*.toml' -delete
          find /tmp/universalist-base/codex/agents \
            -mindepth 1 -type d -exec rm -rf {} +
          rm -rf /tmp/universalist-base/codex/skills/*
          cp -R codex/skills/universalist \
            /tmp/universalist-base/codex/skills/
          cd /tmp/universalist-base
          zip -qr /tmp/universalist-v16.3-base.zip codex

      - uses: actions/upload-artifact@v4
        with:
          name: universalist-v16.3-base
          path: /tmp/universalist-v16.3-base.zip
          if-no-files-found: error
          retention-days: 1
