name: Package Universalist PR123

on:
  push:
    branches:
      - universalist
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: universalist
          fetch-depth: 1
      - name: Build exact checkout archive
        run: |
          git rev-parse 'HEAD^{tree}' > /tmp/tree-sha.txt
          tar --exclude=.git -czf /tmp/pr123-checkout.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: pr123-exact-checkout
          path: |
            /tmp/pr123-checkout.tar.gz
            /tmp/tree-sha.txt
          if-no-files-found: error
          retention-days: 1
