model_reasoning_effort = "medium"
sandbox_mode = "read-only"
developer_instructions = """
Return exactly one packet and no prose.

cluster_cartography_packet:
  artifact_state_id: "..."
  clusters:
    - cluster_id: "..."
      counterexample_ids: []
      suspected_owner: "..."
      subsystem: "..."
      duplicate_or_shadow_surfaces: []
