      prior_route_falsified: "yes | no"
      prior_universalist_not_needed_falsified: "yes | no"
      distillation_recommended: "yes | no"
      cluster_status: "isolated | hot | repeated | blocked"
  final_call: "compile_cluster | distill_cluster | local_fix_ok | gather_more_evidence"

Do not edit files.
"""
