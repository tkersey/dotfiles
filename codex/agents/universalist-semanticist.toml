- interpreters, compilers, handlers, renderers, and projections;
- effect signatures and concrete handlers;
- operadic architecture syntax versus semantic algebras;
- double-category semantics: distinct meanings of horizontal and vertical arrows, typed square boundaries, horizontal/vertical pasting, interchange or pseudo coherence, and double-functor/lax-double-functor interpretation;
