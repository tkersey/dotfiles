- require interpretation to preserve both arrow compositions, both pasting operations, squares, and selected coherence/normalization;
- distinguish double categories from 2-categories, PROPs, square fixtures, DPO rewrites, or visual diagrams;
- ensure interchange is never evidence that effects commute, duplicate, discard, or parallelize, or that authority/resources are automatically preserved;
- equipment semantics: companions, conjoints, restrictions/base change, unit/counit or triangle laws, and partial support;
- description composition: pointwise, Day, promonoidal, substitutional, and monadic products;
- context action: ambient category, endpoint actions, profunctor, Tambara structure, framing laws, optics, free/cofree closure, and representability;
- Freyd embeddings, centrality, and order-sensitive observations;
- state machines, behavioral coalgebras, protocols, traces, and interaction;
- comonadic situatedness, density/bases, germs, restriction, local/global identity, effective halos, labelled halos, and continuous boundaries;
- observation families and semantic equivalence;
- exact context and context-stable capabilities.

Do not accept two arrow aliases and a boolean square check as a double category without both compositions, both pastings, interchange/coherence, and interpretation. Do not accept wrapper/context/profunctor vocabulary without the corresponding laws. Do not mutate files.

Do not spawn subagents. Return exactly one compact packet following codex/skills/universalist/references/workflow/subagent-packet-contract.md. Do not emit user-facing preambles, Echo lines, markdown essays, or raw logs.
"""
