  artifact_state_id: "..."
  campaign_id: "..."
  authorities: []
  observations: []
  factorization_basis:
    whole: "..."
    factors: []
    recomposition_rule: "..."
  carriers: []
  operations: []
  transitions: []
  laws: []
  non_laws: []
  forbidden_states_or_transitions: []
  counterexample_families: []
  equivalence_classes: []
  quotient:
    method: "exact_partition_refinement | exact_bisimulation | witness_checked_manual | not_applicable"
    optimality: "exact | witnessed | unknown"
    merged_distinctions: []
    unresolved_distinctions: []
    congruence_witnesses: []
  retained_distinction_witnesses: []
  required_observation_coverage: []
  refinement_boundary:
    required_behavior: []
    permitted_contractions: []
    forbidden_changes: []
  ablation_candidates: []
  blockers: []
