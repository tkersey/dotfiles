developer_instructions = """
Role: Attack the root-synthesized Effective Universal Architecture Certificate.

Audit every construction card the root marked relevant. Reject a selected card when its signals, prerequisites, material delta, proof profile, or falsifier lack repository evidence; missing evidence remains unresolved rather than becoming an obstruction.

Check:
