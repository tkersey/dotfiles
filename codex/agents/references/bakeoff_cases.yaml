schema_version: 1
suite_id: custom-role-core-bakeoff-v1
cases:
  - id: selector_orchplan_from_list
    role: selector
    goal: Produce an OrchPlan v1 from an inline task list without mutating sources.
    context: Dotfiles planning and orchestration work.
    instructions: |
      Use `$select` on an inline three-task list touching parser wiring, config loading, and tests.
      Emit OrchPlan v1 YAML plus Decision Trace only.
    acceptance_checks:
      - "Emits `schema_version: 1` and `kind: OrchPlan`."
      - "Emits a Decision Trace with `claim`, `counts`, and `waves`."
      - "Stays plan-only and does not suggest mutating the source directly."
    metrics:
      - handoff_count
      - parent_rewrite_needed
      - first_usable_artifact_latency
  - id: coder_minimal_skill_patch
    role: coder
    goal: Run parse-first author/judge orchestration and emit one winning diff for a bounded change.
    context: Dotfiles skill maintenance with explicit scope, proof command, and focus paths.
    instructions: |
      Given a bounded skill-doc change request, run one shared parse preflight, fan out strict-output author workers,
      compare their outputs, and emit only the winning diff plus concise why-winner metadata.
      If the best seam is a reduction-style edit, carry `approach=reduce` as a shared author constraint instead of spawning reducer.
    acceptance_checks:
      - "Emits exactly one Winner Record block."
      - "Emits exactly one fenced diff block or `NO_DIFF:<reason>`."
      - "Includes `winner_candidate_id` and `cohort_mode=full_5x3|degraded_3x1`."
    metrics:
      - handoff_count
      - parent_rewrite_needed
      - artifact_scope_accuracy
  - id: fixer_single_pass_review
    role: fixer
    goal: Review the selected winner and pass through, repair, or block it in one pass.
    context: Dotfiles bounded diff hardening before proof.
    instructions: |
      Review one coder-selected winner for contract fit, invariants, regression risk, and doctrine fit.
      Emit doctrine scores inline and either pass through, repair within scope, or block with exact rerun guidance.
    acceptance_checks:
      - "Emits `decision`."
      - "Emits `doctrine_scores`, `blocking_findings`, and `repair_summary`."
      - "Emits `proof_gate` when proof still needs to run."
    metrics:
      - handoff_count
      - parent_rewrite_needed
      - review_usefulness
  - id: prover_apply_plus_prove
    role: prover
    goal: Apply a candidate patch in a temp worktree and run one proof command.
    context: Dotfiles proof step after a bounded candidate is accepted.
    instructions: |
      Apply the provided patch artifact in a temp worktree, run the named proof command,
      and emit structured proof evidence without fabricating pass/fail.
    acceptance_checks:
      - "Applies the patch only when a patch artifact is present."
      - "Emits `proof_status`, `proof_attempts`, and `proof_evidence`."
      - "Emits `apply_evidence` when application was required."
    metrics:
      - handoff_count
      - proof_pass_rate
      - first_usable_artifact_latency
  - id: integrator_patch_first_delivery
    role: integrator
    goal: Package one accepted candidate into a scoped delivery artifact.
    context: Dotfiles patch-first delivery after proof.
    instructions: |
      Use the accepted candidate and proof evidence to emit a patch-first delivery result.
      Only switch to commit-first when explicitly requested.
    acceptance_checks:
      - "Emits `decision`, `mode`, `artifact_ref`, and `scope_assertion`."
      - "Preserves `patch_first` as the default."
      - "Does not re-adjudicate safety."
    metrics:
      - handoff_count
      - parent_rewrite_needed
      - delivery_scope_accuracy
  - id: deprecated_role_redirects
    role: deprecated-shims
    goal: Ensure every retired role redirects deterministically to the new core path.
    context: Dotfiles compatibility window for existing prompts.
    instructions: |
      Invoke `reducer`, `mentor`, `locksmith`, and `applier` with minimal prompts and capture their redirect outputs.
    acceptance_checks:
      - "Each retired role emits `DEPRECATED_ROLE:<replacement>`."
      - "No retired role performs substantive work."
      - "Each redirect includes a concise `reason` and `next_step`."
    metrics:
      - redirect_accuracy
      - parent_rewrite_needed
      - migration_friction
