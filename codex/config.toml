model = "gpt-5.4"
model_context_window = 1000000
model_auto_compact_token_limit = 900000
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
suppress_unstable_features_warning = true
web_search = "live"
personality = "pragmatic"
service_tier = "fast"

[agents]
max_threads = 96
max_depth = 3

[agents.coder]
description = "Run parse-first author/judge orchestration and emit one winning patch candidate."
config_file = "~/.codex/agents/coder.toml"

[agents.fixer]
description = "Repair or block the coder-selected winner, including doctrine-fit scoring."
config_file = "~/.codex/agents/fixer.toml"

[agents.selector]
description = "Drive `$select` plan-to-task decomposition for maximum safe parallelism."
config_file = "~/.codex/agents/selector.toml"

[agents.joiner]
description = "Peripheral GH-only PR routing specialist."
config_file = "~/.codex/agents/joiner.toml"

[agents.integrator]
description = "Package accepted artifacts and materialize scoped delivery."
config_file = "~/.codex/agents/integrator.toml"

[agents.prover]
description = "Apply candidate patches in a temp worktree and run bounded proof."
config_file = "~/.codex/agents/prover.toml"

[features]
unified_exec = true
steer = true
collaboration_modes = true
apps = true
personality = true
memories = true
sqlite = true
responses_websockets_v2 = true
multi_agent = true
prevent_idle_sleep = true
voice_transcription = true
js_repl = true
default_mode_request_user_input = true
fast_mode = true
codex_hooks = true

[tui]
experimental_mode = "execute"
status_line = ["current-dir", "git-branch", "context-remaining", "model-with-reasoning", "codex-version", "fast-mode", "session-id"]
theme = "coldark-dark"

[projects."/Users/tk/workspace/tk/codex"]
trust_level = "trusted"

[projects."/Users/tk/workspace/tk/shift"]
trust_level = "trusted"

[projects."/Users/tk/.dotfiles"]
trust_level = "trusted"

[projects."/Users/tk/workspace/tk/skills-zig"]
trust_level = "trusted"

[projects."/Users/tk/Downloads"]
trust_level = "trusted"

[projects."/Users/tk/workspace/opencode-harness-gist"]
trust_level = "trusted"
