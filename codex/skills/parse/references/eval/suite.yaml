version: 1
cases:
  - id: layered-api
    repo: fixtures/layered-api
    expected_repo_kind: application-service
    expected_top_signal: layered
    min_entrypoint_hint_count: 1

  - id: component-web
    repo: fixtures/component-web
    expected_repo_kind: application-service
    expected_top_signal: component-ui
    min_entrypoint_hint_count: 1

  - id: clean-sdk
    repo: fixtures/clean-sdk
    expected_repo_kind: library-sdk
    expected_top_signal: clean-hexagonal
    min_dependency_hint_count: 2

  - id: modular-cli
    repo: fixtures/modular-cli
    expected_repo_kind: cli-tooling
    expected_top_signal: modular-monolith
    min_entrypoint_hint_count: 1

  - id: microservice-platform
    repo: fixtures/microservice-platform
    expected_repo_kind: monorepo-platform
    expected_top_signal: microservice
    min_runtime_hint_count: 2
    focus_paths:
      - apps/web
      - services/auth
    focus_expectations:
      - path: apps/web
        expected_top_signal: component-ui
        note_regex: differs|exception
      - path: services/auth
        expected_top_signal: layered
        note_regex: differs|exception

  - id: pipeline-jobs
    repo: fixtures/pipeline-jobs
    expected_repo_kind: data-pipeline
    expected_top_signal: pipeline
    min_runtime_hint_count: 1

  - id: plugin-host
    repo: fixtures/plugin-host
    expected_repo_kind: plugin-extension
    expected_top_signal: plugin

  - id: infra-event-router
    repo: fixtures/infra-event-router
    expected_repo_kind: infra-ops
    expected_top_signal: event-driven
    min_runtime_hint_count: 1

  - id: services-folder-layered
    repo: fixtures/services-folder-layered
    expected_repo_kind: application-service
    expected_top_signal: layered
    forbidden_top_signals:
      - microservice

  - id: clean-docs-drift
    repo: fixtures/clean-docs-drift
    expected_repo_kind: application-service
    expected_top_signal: layered
    expected_docs_claim_regex: clean architecture
    forbidden_top_signals:
      - clean-hexagonal
    min_dependency_hint_count: 1
