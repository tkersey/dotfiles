# Output invariants for difficult prompts.

cases:
  - prompt: "Give a source-backed citation audit for effect handlers versus delimited continuations in OCaml."
    response_tier: ledger
    expected:
      - separates semantic claims from implementation claims
      - identifies one-shot restrictions
      - cites [OCAML-MANUAL] for operational surface
      - cites [OCAML-RETROEFF-2021] for runtime evidence
      - does not use [JS-ASYNC] as runtime evidence

  - prompt: "Design a benchmark for continuation implementation strategies."
    response_tier: memo
    expected:
      - names semantic contract before workload
      - includes capture/resume metrics
      - includes allocation or GC pressure
      - cites [RT-FOLKLORE-2020] for methodology
      - avoids recommending a strategy without tradeoffs

  - prompt: "Make a study plan to master defunctionalization and delimited control."
    response_tier: memo
    expected:
      - includes artifacts, not only readings
      - includes witness notebook discipline
      - cites [DC-AC-1990], [DEF-DN-2001], and [DEF-AGER-2003]
      - includes proof or benchmark next steps

  - prompt: "Explain one-shot versus multi-shot continuations in two paragraphs."
    response_tier: compact
    expected:
      - uses a double-resume witness
      - names whether reuse is forbidden, trapped, or cloned
      - cites [RT-ONE-SHOT-1996] and [OCAML-MANUAL] if OCaml is mentioned
