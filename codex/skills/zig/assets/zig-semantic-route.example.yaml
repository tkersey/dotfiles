zig_semantic_route:
  route_version: ZSR-v1
  artifact_state:
    repository_root: /repo
    head: HEAD_SHA
    dirty_fingerprint: sha256:replace
    zig_version: 0.16.0

  task_surfaces:
    - allocator/ownership/lifetime
    - testing/fuzzing/failure-discovery

  material: "yes"
  active_families:
    - lifetime-escape
    - proof-context
  no_family_reason: ""

  owner: ParsedRun
  concrete_counterexample: parent_run_id borrows parsed arena storage after arena deinit
  selected_repair_boundary: duplicate parent_run_id into the returned owner before deinit

  forbidden_shortcuts:
    - document the dangling borrow without changing ownership
    - extend arena lifetime globally
    - mark borrowed storage owned

  required_proof:
    - escape table
    - regression that deinitializes parsed state before using returned parent_run_id
    - final proof epoch

  proof_epoch_required: "yes"

  family_contracts:
    lifetime-escape:
      question: Who owns parent_run_id after beginRun returns?
      proof:
        - returned owner frees duplicated bytes
        - no input/arena borrow remains
    proof-context:
      question: Does closure proof match the final ownership patch?
      proof:
        - ZPE-v1 passes on final tree

  gate:
    classified_before_first_edit: "yes"
    mutation_allowed: "yes"
