policy:
  allow_implicit_invocation: false
interface:
  display_name: "Zig"
  short_description: "Route Zig work by surface and semantic failure family"
  default_prompt: >-
    Use $zig for Zig 0.16.0 work. Verify the installed version and repository
    state, then classify both the work surface and any active semantic family:
    claim binding, lifetime escape, atomic transition, verifier completeness,
    repository closure, or proof context. For material work, emit a ZSR-v1 route
    before editing; let the active family constrain ownership, forbidden
    shortcuts, and proof. Keep detailed comptime, allocator, pointer, FFI/layout,
    concurrency, build, lint, fuzz, performance, and cache guidance in the
    existing references. Treat proof as stale when its exact tree, command,
    toolchain, target, options, dependencies, or generated artifacts change.
