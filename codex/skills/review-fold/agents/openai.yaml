policy:
  allow_implicit_invocation: true
interface:
  display_name: "Review Fold"
  short_description: "Classify CAS/PR review findings and choose reject, proof-only, minimal-fix, or refactor-kernel"
  default_prompt: >-
    Use $review-fold for CAS findings, PR comments, reviewer suggestions, or
    review-like claims. Bind findings to the original goal and current diff,
    compress duplicates, classify liability and intent relation, and choose
    triage, remediation-plan, review-closeout, proof-only, minimal-fix,
    refactor-kernel, branch-race, or st-governed before code changes. A review
    finding is never mutation authority; the resolution fold must accept any
    code-change candidate before implementation. If fresh or exhaustive workflow
    review is required and no CAS result is present, route to $cas review first.
    Mark normalized CAS clean runs when closing review.
