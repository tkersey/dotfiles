skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: review-fold
    kind: mixed
    source_fingerprint: review-fold-counterexample-set-v1
  triggers:
    - trigger_id: RF-SOURCE
      description: Witnessed falsification evidence needs source-bound classification.
      cue_literals: [review finding, failing test, incident, bug report, migration failure, compatibility failure]
      cue_regexes: []
      exclusions: []
    - trigger_id: RF-CLASS
      description: Multiple finding rows may witness one stable law-and-boundary class.
      cue_literals: [duplicate finding, same law, same boundary, recurrence]
      cue_regexes: []
      exclusions: []
  routes:
    - route_id: RF-COUNTEREXAMPLE
      description: Author the current immutable counterexample-set/v1.
      aliases: [accepted, rejected, follow-up]
      terminal: "yes"
    - route_id: RF-BLOCK
      description: Block when source, validity, applicability, ownership, or subject identity is unknown.
      aliases: [blocked]
      terminal: "yes"
  clauses:
    - clause_id: RF-CLASSIFY-001
      trigger_refs: [RF-SOURCE]
      expected_routes: [RF-COUNTEREXAMPLE, RF-BLOCK]
      prohibited_routes: []
      required_artifacts: [counterexample-set/v1, source-owner evidence, current Goal binding, current Construction binding, disposition for every class]
      success_signals: [claims facts and suggested repairs are separate, a clean source is representable without invented findings]
      failure_signals: [review prose directly selects work, unknown or stale evidence is treated as current]
      rationale: Classification remains evidence and never becomes mutation authority.
    - clause_id: RF-QUOTIENT-001
      trigger_refs: [RF-CLASS]
      expected_routes: [RF-COUNTEREXAMPLE, RF-BLOCK]
      prohibited_routes: []
      required_artifacts: [stable class identity, boundary key, governing law, discrepancy, owner boundary, witness, falsifier, applicability, quotient basis]
      success_signals: [duplicates collapse into one class, recurrence across Constructions retains stable class identity]
      failure_signals: [attempt commit publication epoch or patch proposal defines class identity, a repair or next action is selected]
      rationale: Actuating evaluates stable falsifiers rather than a patch queue.
  instrumentation:
    decision_receipt: not-needed
    rationale: The immutable Counterexample Set already records every disposition and quotient class consumed by Actuating.
