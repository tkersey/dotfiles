skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: review-fold
    kind: mixed
    source_fingerprint: review-fold-rf-v2-classification-only
  triggers:
    - trigger_id: RF-SOURCE
      description: Review evidence needs source-bound classification.
      cue_literals: [review finding, review thread, human review, CAS review, local audit]
      cue_regexes: []
      exclusions: []
    - trigger_id: RF-MATERIAL
      description: Material review pressure needs quotienting before resolution.
      cue_literals: [blocks goal, regression risk, misuse hazard, invariant gap, complexity stall]
      cue_regexes: []
      exclusions: []
  routes:
    - route_id: RF-NO-CODE
      description: Reject, prove, ask, or follow up without implementation.
      aliases: [reject, proof-only, ask-human, follow-up]
      terminal: "yes"
    - route_id: RF-RESOLUTION-INPUT
      description: Emit a classified owner-boundary input for review-resolution/v1.
      aliases: [resolution-input]
      terminal: "yes"
    - route_id: RF-BLOCK
      description: Block when source, validity, ownership, or artifact binding is unknown.
      aliases: [blocked]
      terminal: "yes"
  clauses:
    - clause_id: RF-CLASSIFY-001
      trigger_refs: [RF-SOURCE]
      expected_routes: [RF-NO-CODE, RF-RESOLUTION-INPUT, RF-BLOCK]
      prohibited_routes: []
      required_artifacts: [RF-v2 receipt, source identity, current artifact binding, disposition for every finding]
      success_signals: [claim fact and suggested repair are separate, zero-finding clean source is representable]
      failure_signals: [review prose directly selects work, unknown source is treated as current]
      rationale: Classification must remain evidence rather than authority.
    - clause_id: RF-QUOTIENT-001
      trigger_refs: [RF-MATERIAL]
      expected_routes: [RF-NO-CODE, RF-RESOLUTION-INPUT, RF-BLOCK]
      prohibited_routes: []
      required_artifacts: [observed fact, quotient key, owner boundary, law family, falsifier, evidence references]
      success_signals: [duplicates collapse into one equivalence class, specialized liabilities create routing obligations]
      failure_signals: [one implementation distinction per comment, selected repair or clean counter emitted]
      rationale: Resolution should receive owner-level classes, not a patch queue.
  instrumentation:
    decision_receipt: required
    rationale: Finding dispositions and quotient classes determine whether pressure may enter review resolution.
