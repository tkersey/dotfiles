policy:
  allow_implicit_invocation: false
interface:
  display_name: "Recursion Scheme Planner"
  short_description: "Choose recursive topology before ALSR/HYL loop-machine compilation"
  default_prompt: >-
    Use $recursion-scheme-planner after an implementation spec or direct goal is
    accepted and before execution when the work needs a nontrivial breakdown.
    Select the correct loop shape: fold, unfold, hylo, memoized migration,
    history-aware debug loop, lookahead, branch-race, proof-carrying patch,
    review compression, parallel traversal, or $st-governed execution. Emit a
    compact Scheme Plan and hand off to $agent-loop-schemes when ALSR/HYL loop
    compilation is required. Do not implement code.
