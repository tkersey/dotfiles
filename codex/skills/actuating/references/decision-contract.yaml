skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: actuating
    kind: mixed
    source_fingerprint: ACT-AK-v1

  triggers:
    - trigger_id: ACT-BARE
      description: Bare Actuating implements, hands publication to Ship, and drives review to derived terminal closure.
      cue_literals: [$actuating, /goal $actuating]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-MODE
      description: Explicit modes select only implement, triage, remediation-plan, or review-closeout.
      cue_literals: [$actuating implement, $actuating triage, $actuating remediation-plan, $actuating review-closeout]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-REVIEW-DEFAULT
      description: Unqualified review, inspect, audit, or classify intent is non-mutating triage.
      cue_literals: [review, inspect, audit, classify]
      cue_regexes: []
      exclusions: []

  routes:
    - route_id: ACT-OPEN
      description: Register a source-authorized Goal Contract and selected K0 while Ledger injects its built-in static Review Contract under artifact-kernel-v1.
      aliases: [open]
      terminal: "no"
    - route_id: ACT-IMPLEMENT
      description: Realize the current Construction through capability-before-effect operations and proof observations.
      aliases: [implement]
      terminal: "no"
    - route_id: ACT-TRIAGE
      description: Acquire review and author a Counterexample Set without mutation.
      aliases: [triage]
      terminal: "yes"
    - route_id: ACT-REMEDIATION
      description: Propose a successor Construction Contract without execution authority or mutation.
      aliases: [remediation-plan]
      terminal: "yes"
    - route_id: ACT-REVIEW-CLOSEOUT
      description: Register and realize a successor Construction, complete ablation, publish through Ship when required, and obtain fresh convergence.
      aliases: [review-closeout]
      terminal: "no"
    - route_id: ACT-SHIP-HANDOFF
      description: Hand a current ready-to-ship closure receipt to Ship, then append its successful receipt as evidence.
      aliases: [ship-handoff]
      terminal: "no"
    - route_id: ACT-DERIVE
      description: Replay the Evidence Ledger and derive state or closure without peer mutable truth.
      aliases: [state, decide]
      terminal: "yes"
    - route_id: ACT-BLOCK
      description: Fail closed on stale authority, construction, subject, capability, proof, retirement, review, publication, or mixed protocol.
      aliases: [blocked]
      terminal: "yes"

  clauses:
    - clause_id: ACT-KERNEL-001
      trigger_refs: [ACT-BARE, ACT-MODE]
      expected_routes: [ACT-OPEN, ACT-IMPLEMENT, ACT-TRIAGE, ACT-REMEDIATION, ACT-REVIEW-CLOSEOUT, ACT-SHIP-HANDOFF, ACT-DERIVE, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts: [goal-contract/v3, counterexample-set/v1 when classified findings exist, construction-contract/v1, actuating-evidence-event/v1]
      success_signals: [exactly four authoritative per-goal artifact families, static Review Contract rather than per-run policy, Construction Contract is the sole architecture selection, Evidence Ledger is the sole mutable per-goal truth, state and closure are deterministic projections]
      failure_signals: [GC-v2 participates in artifact-kernel authority, RF-v2 participates in artifact-kernel authority, per-run review policy participates, owner synthesis or review resolution remains a peer authority, persisted mutable kernel state participates, protocols mix within one goal]
      rationale: The four-artifact kernel preserves source, construction, falsification, and observation without duplicated mutable truth.

    - clause_id: ACT-AUTHORITY-001
      trigger_refs: [ACT-BARE, ACT-MODE]
      expected_routes: [ACT-OPEN, ACT-IMPLEMENT, ACT-REVIEW-CLOSEOUT, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts: [current Goal Contract, current Construction Contract, matching repository subject, Ledger-issued single-use capability before effect]
      success_signals: [plan and review remain non-authorizing, executor projects rather than selects architecture, proof and retirement obligations come from the Construction, Ship alone owns public effects]
      failure_signals: [finding selects a patch directly, Construction grants authority by itself, effect precedes capability admission, executor broadens scope or selects strategy, public effect bypasses Ship]
      rationale: Mutation is the conjunction of source authority, selected construction, current subject, and causal capability admission.

    - clause_id: ACT-REVIEW-001
      trigger_refs: [ACT-BARE, ACT-MODE, ACT-REVIEW-DEFAULT]
      expected_routes: [ACT-TRIAGE, ACT-REMEDIATION, ACT-REVIEW-CLOSEOUT, ACT-DERIVE, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts: [actuating-review-contract/v1 static law, five request bindings before initial dispatch, current Counterexample Set after findings, successor Construction before accepted-class mutation, review events in the Evidence Ledger]
      success_signals: [unqualified review selects triage, first standard and four auxiliaries launch concurrently, every launched sibling reaches terminal transport evidence, verdictless failure earns no credit and changes only its request, same-subject transport recovery reruns only that request once, successful full-wave standard counts as clean one, four later standard clean attempts run serially, five consecutive standard cleans close the current subject, every material change resets all review credit]
      failure_signals: [review prose grants mutation, a sibling is cancelled after finding or transport failure, a verdictless failure resets or relaunches the whole wave, a second verdictless attempt retries indefinitely, auxiliary evidence earns standard credit, any review credit crosses a material change, an auxiliary-remediation carry participates]
      rationale: Review independently falsifies; it does not manufacture authority or survive a changed subject.

    - clause_id: ACT-CLOSURE-001
      trigger_refs: [ACT-BARE, ACT-MODE]
      expected_routes: [ACT-SHIP-HANDOFF, ACT-DERIVE, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts: [current Goal and Construction, current Counterexample dispositions, complete proof and retirement observations, current Ship evidence when required, current review convergence when required]
      success_signals: [no pending operation or outstanding proof, every accepted Counterexample is excluded or rejected with evidence, every dominated construct is retired and independently observed, derived verdict is continue ready-to-ship complete or blocked, source-memory evaluation occurs after delivery closure]
      failure_signals: [independently authored closure grants completion, Proof Patch precedes current closure, stale publication or review receives credit, memory checkpoint gates code closure]
      rationale: Closure is a current fold of authority, construction, counterexamples, evidence, review law, and subject identity.

  instrumentation:
    decision_receipt: required
    rationale: Content-addressed documents and an append-only Evidence Ledger make authority, effects, review, and closure replayable.
