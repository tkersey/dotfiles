skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: actuating
    kind: mixed
    source_fingerprint: ACT-AK-v3

  triggers:
    - trigger_id: ACT-BARE
      description: Bare Actuating implements, hands publication to Ship, and drives review to terminal closure.
      cue_literals: [$actuating, /goal $actuating]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-MODE
      description: Explicit modes select only implement, triage, remediation-plan, or review-closeout.
      cue_literals: [$actuating implement, $actuating triage, $actuating remediation-plan, $actuating review-closeout]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-REVIEW-DEFAULT
      description: Unqualified review, inspect, audit, or classify intent is non-mutating triage.
      cue_literals: [review, inspect, audit, classify]
      cue_regexes: []
      exclusions: []

  routes:
    - route_id: ACT-IMPLEMENT
      description: Select and realize the current correct-by-construction architecture.
      aliases: [implement]
      terminal: "no"
    - route_id: ACT-TRIAGE
      description: Acquire review and classify Counterexamples without mutation.
      aliases: [triage]
      terminal: "yes"
    - route_id: ACT-REMEDIATION
      description: Propose a successor Construction without mutation authority.
      aliases: [remediation-plan]
      terminal: "yes"
    - route_id: ACT-REVIEW-CLOSEOUT
      description: Evaluate Counterexamples, realize a successor, ablate residue, publish when required, and obtain fresh convergence.
      aliases: [review-closeout]
      terminal: "no"
    - route_id: ACT-SHIP-HANDOFF
      description: Hand a current ready-to-ship proof to Ship and record returned publication evidence.
      aliases: [ship-handoff]
      terminal: "no"
    - route_id: ACT-CLOSE
      description: Apply the closure theorem to current artifacts and observations.
      aliases: [continue, ready-to-ship, complete, blocked]
      terminal: "yes"

  clauses:
    - clause_id: ACT-KERNEL-001
      trigger_refs: [ACT-BARE, ACT-MODE]
      expected_routes: [ACT-IMPLEMENT, ACT-TRIAGE, ACT-REMEDIATION, ACT-REVIEW-CLOSEOUT, ACT-SHIP-HANDOFF, ACT-CLOSE]
      prohibited_routes: []
      required_artifacts: [goal-contract/v3, counterexample-set/v1 when classified findings exist, construction-contract/v3, actuating-evidence-event/v1]
      success_signals: [exactly four authoritative families, every Construction compiles the four canonical candidate families with explicit factors predecessor and successor surfaces and total supersession, Universalist nominates and Reduce challenges once before Actuating alone adjudicates and selects the Construction and next action, compact composed analysis needs no independent SDR-v1 or RC-v1, Actuating owns the static Review Contract and semantic closure receipt, Ledger 0.13.0 or newer is the sole structural admission owner, Seq 0.5.0 or newer consumes only Ledger checked structure, Construction v1 and v2 data is ignored without migration, Ship alone owns public effects]
      failure_signals: [a finding selects mutation directly, Universalist or $reduce selects a Construction or Repair Disposition or operation or next action or closure, a candidate family is omitted reordered or inferred from mutable enum order, supersession leaves a factor unpartitioned or encodes identity-only normalization, a supporting plan certificate or receipt becomes required authority, Ledger or an executor selects architecture or a next action, Seq interprets Construction schema independently, legacy Construction data participates in current authority, Ledger emits semantic workflow state or closure, peer policy or resolution state participates, a public effect bypasses Ship]
      rationale: Source authority, construction, falsification, observation, and bounded minimization remain distinct without duplicated control truth.

    - clause_id: ACT-REVIEW-001
      trigger_refs: [ACT-BARE, ACT-MODE, ACT-REVIEW-DEFAULT]
      expected_routes: [ACT-TRIAGE, ACT-REMEDIATION, ACT-REVIEW-CLOSEOUT, ACT-CLOSE]
      prohibited_routes: []
      required_artifacts: [Actuating-owned actuating-review-contract/v1, five request bindings before initial dispatch, exact CAS owner receipts, current Counterexample Set after findings, successor Construction before accepted-class mutation, review observations in the Evidence Ledger]
      success_signals: [Actuating maps CAS owner facts to semantic credit, accepted-class mutation follows a Law Owner Reduction Route Why-not-smaller Falsifier disposition, a nominee with a disputable semantic factor receives one pre-mutation Reduce challenge, implementation triggers a successor challenge only when the realized factorization materially changes, one accepted class recurring after repair or two evidenced same-cause accepted classes trigger a causal recurrence disposition before another affected mutation, the triggered disposition compares realization preservation admitted-domain restriction representation strengthening and ablation normalization and requires instance-specific non-example proof or an architecture ablation or blocked result, an accepted Review Fold binds the exact current subject Counterexample Set and accepted-class list before successor mutation, initial 1+4 launches concurrently, siblings are non-cancelling, verdictless failure earns no credit and recovers only its request once, full-wave standard clean counts as one, four later standard cleans run serially, five consecutive standard cleans close the current subject, material change resets all review credit]
      failure_signals: [Ledger hardcodes the Review Contract, Ledger dispatches or interprets CAS, Ledger computes review credit, Ledger computes causal recurrence or its disposition, review prose grants mutation, a suggested implementation bypasses Construction selection, $reduce grants mutation or bypasses Actuating selection, a disputable factor reaches mutation without its challenge, a same-cause local repair is selected after the causal recurrence gate without the required disposition, a validator repeatedly reconstructs information omitted by the selected representation without comparing restriction or representation strengthening, line count alone triggers reduction, the same candidate and evidence enter recursive Universalist Reduce competition, sibling cancellation, whole-wave transport retry, indefinite retry, review credit crosses a material change]
      rationale: Review independently falsifies while Actuating owns orchestration, pre-mutation minimization, least-additive repair selection, and every successor decision.

    - clause_id: ACT-CLOSURE-001
      trigger_refs: [ACT-BARE, ACT-MODE]
      expected_routes: [ACT-SHIP-HANDOFF, ACT-CLOSE]
      prohibited_routes: []
      required_artifacts: [current Goal and Construction, current Counterexample dispositions, complete proof and retirement observations, current Ship evidence when required, current review convergence when required]
      success_signals: [Actuating applies the closure theorem and authors actuating-closure-receipt/v1, no unresolved operation or proof, every accepted Counterexample is excluded or blocked, every dominated construct is retired, source-memory evaluation follows delivery handoff]
      failure_signals: [Ledger emits a semantic closure verdict or receipt, Proof Patch grants completion, stale publication or review receives credit, memory status gates delivery]
      rationale: Closure is a semantic judgment over current owner-issued facts, not a Ledger side effect.

  instrumentation:
    decision_receipt: required
    rationale: Current artifacts and append-only observations keep each semantic owner inspectable.
