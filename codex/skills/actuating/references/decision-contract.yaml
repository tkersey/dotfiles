skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: actuating
    kind: mixed
    source_fingerprint: actuating-zig-kernel-v1

  triggers:
    - trigger_id: ACT-IMPLEMENT
      description: Bare invocation runs implementation generation, ship, review generation, and final closure; explicit implement stops after a complete local generation.
      cue_literals: [$actuating, /goal $actuating, $actuating implement, implement accepted work, execute accepted plan]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-REVIEW
      description: Review defaults to no-code triage unless mutation is explicit.
      cue_literals: [review, triage, remediation-plan, review-closeout]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-CLOSE
      description: Completion requires a live closed Zig kernel generation and closure-decision/v1.
      cue_literals: [ledger --source actuation, closure-decision/v1, complete, ready-to-ship]
      cue_regexes: []
      exclusions: []

  routes:
    - route_id: ACT-OPEN
      description: Project a current GoalContract into actuation-open/v1 and open one immutable generation.
      aliases: [open, execute]
      terminal: "no"
    - route_id: ACT-STEP
      description: Prepare and consume one capability-bound operation selected from the current kernel projection.
      aliases: [prepare, record, execute, observe]
      terminal: "no"
    - route_id: ACT-TRIAGE
      description: Classify review evidence without mutation or a material kernel generation.
      aliases: [triage, review-only]
      terminal: "yes"
    - route_id: ACT-REMEDIATION
      description: Produce review-resolution/v1 without selecting executable mutation.
      aliases: [remediation-plan]
      terminal: "yes"
    - route_id: ACT-REVIEW-CLOSEOUT
      description: Refresh review evidence, select one resolution node, and execute it through a review-bound kernel generation.
      aliases: [review-closeout]
      terminal: "no"
    - route_id: ACT-CLOSURE
      description: Close the generation and project closure-decision/v1 in Zig.
      aliases: [close, decide, complete]
      terminal: "yes"
    - route_id: ACT-SHIP-HANDOFF
      description: Hand a ready-to-ship Zig decision to ship, then continue the bare goal in a new review generation.
      aliases: [ship-handoff]
      terminal: "no"
    - route_id: ACT-BLOCK
      description: Stop on missing authority, stale state, invalid capability, uncovered obligation, unresolved review, failed verifier, or unsupported coordination.
      aliases: [blocked]
      terminal: "yes"

  clauses:
    - clause_id: ACT-KERNEL-001
      trigger_refs: [ACT-IMPLEMENT]
      expected_routes: [ACT-OPEN, ACT-STEP, ACT-CLOSURE, ACT-SHIP-HANDOFF, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts: [GC-v2, actuation-open/v1, actuation-event/v1, actuation-kernel-state/v1, closure-decision/v1]
      success_signals: [source and execution authority remain distinct, every terminal predicate has an executable obligation, every effect is prepared before execution, the event fold conserves obligations, /goal alone repeats, a closed generation projects its immutable terminal route]
      failure_signals: [plan grants mutation, post-hoc preparation, caller success flag, duplicate idempotency key, path escape, verifier substitution, operation claims parent completion, CLI owns a recursive loop, another language participates in actuation decisions]
      rationale: The Zig kernel owns causal execution and live closure while /goal owns fixed-point iteration.

    - clause_id: ACT-REVIEW-001
      trigger_refs: [ACT-REVIEW]
      expected_routes: [ACT-TRIAGE, ACT-REMEDIATION, ACT-REVIEW-CLOSEOUT, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts: [actuation-review-policy/v1 before fresh review execution, current review source, RF-v2 before resolution, review-resolution/v1 before mutation, GoalContract obligations for current review and publication evidence]
      success_signals: [unqualified review selects triage, actuating projects only opaque request identity into CAS, every auxiliary request runs concurrently with the first standard attempt, at least five distinct current standard clean attempts form the closeout suffix, auxiliary attempts never contribute to that suffix, current resolution selects at most one owner node, review mutation uses a prepared Zig capability, final published artifact receives fresh closure-grade evidence]
      failure_signals: [raw finding becomes a patch, stale review source authorizes mutation, an auxiliary lane is skipped or deferred behind the standard streak, fewer than five standard cleans receive closeout credit, an auxiliary attempt receives standard credit, findings regress across reship, review mutation bypasses the kernel, public effects bypass ship]
      rationale: Review evidence names liabilities; it never grants execution authority.

    - clause_id: ACT-CLOSURE-001
      trigger_refs: [ACT-CLOSE]
      expected_routes: [ACT-CLOSURE, ACT-SHIP-HANDOFF, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts: [closed actuation-kernel-state/v1, current repository digest, closure-decision/v1]
      success_signals: [outstanding obligations are empty, no operation is pending, live and folded artifacts match, ready-to-ship continues to ship, complete terminates the goal]
      failure_signals: [open obligations, stale artifact, replayed decision, scalar proof count, proof-patch precedes a current complete decision]
      rationale: Completion is a live Zig projection of the append-only fold.

  instrumentation:
    decision_receipt: required
    executable_authority: ledger --source actuation
    implementation_language: Zig
    rationale: Event digests and closure-decision/v1 make each transition and terminal claim auditable.
