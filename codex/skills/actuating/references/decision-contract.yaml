skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: actuating
    kind: workflow
    source_fingerprint: actuating-v5.2-apma-add-delivery
  triggers:
    - trigger_id: ACT-WORK
      description: One named plan is ready for bounded execution.
      cue_literals: [$actuating, implement plan, plan to PR]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-EXPAND
      description: Realization requires new resources or another plan.
      cue_literals: [resource expansion, cross-plan blocker, new owner]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-INTEGRATE
      description: A valid worker result is ready for target-branch integration.
      cue_literals: [seal change set, integrate]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-SHIP
      description: Integrated proof-complete target-branch state is ready for PR delivery.
      cue_literals: [ship, PR, draft PR, ready PR, plan to PR, delivery]
      cue_regexes: []
      exclusions: [shipping not requested, proof incomplete, integration blocked]
  routes:
    - route_id: ACT-CLAIM
      description: Obtain or refresh workspace authority.
      aliases: [claim]
      terminal: "no"
    - route_id: ACT-REALIZE
      description: Realize one bounded APMA-authorized slice.
      aliases: [realize]
      terminal: "no"
    - route_id: ACT-RETURN-WORKSPACE
      description: Stop and reallocate after authority/resource change.
      aliases: [return-to-workspace]
      terminal: "no"
    - route_id: ACT-INTEGRATE
      description: Enqueue a sealed change set.
      aliases: [integrate]
      terminal: "no"
    - route_id: ACT-SHIP
      description: Hand integrated target-branch state to $ship.
      aliases: [ship, delivery, pr]
      terminal: "yes"
    - route_id: ACT-SHIPPING-NOT-REQUESTED
      description: Close without PR because no PR delivery intent exists.
      aliases: [shipping-not-requested]
      terminal: "yes"
    - route_id: ACT-BLOCK
      description: Stop on stale, unavailable, or incomplete authority/delivery state.
      aliases: [blocked]
      terminal: "yes"
  clauses:
    - clause_id: ACT-GCR-002
      trigger_refs: [ACT-WORK]
      expected_routes: [ACT-CLAIM, ACT-REALIZE, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts:
        - GCR-v2
        - APMA-v1
        - WCL-v1
        - fencing token
      success_signals:
        - every mutation is claim and APMA bound
      failure_signals:
        - plan-local readiness treated as execution authority
        - mutation occurs before APMA-v1
      rationale: Multi-plan safety requires workspace authority before material transition.
    - clause_id: ACT-BOUNDARY-002
      trigger_refs: [ACT-EXPAND]
      expected_routes: [ACT-RETURN-WORKSPACE, ACT-BLOCK]
      prohibited_routes: [ACT-REALIZE]
      required_artifacts:
        - requested resource expansion
      success_signals:
        - new claim, GCR, and APMA before resumed mutation
      failure_signals:
        - related edit outside claim
      rationale: Boundary expansion must rerun global conflict analysis.
    - clause_id: ACT-INTEGRATE-002
      trigger_refs: [ACT-INTEGRATE]
      expected_routes: [ACT-INTEGRATE, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts:
        - CS-v1
        - current branch epoch
      success_signals:
        - worker never advances target branch
      failure_signals:
        - direct push from worker
      rationale: Target-branch state is globally serialized.
    - clause_id: ACT-SHIP-002
      trigger_refs: [ACT-SHIP]
      expected_routes: [ACT-SHIP, ACT-SHIPPING-NOT-REQUESTED, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts:
        - ADD-v1
        - proof-complete plan receipt
        - integrated change-set receipts
        - current target branch/head/epoch
        - cross-plan dependency status
        - explicit or inherited PR mode when shipping
      success_signals:
        - $ship receives integrated target-branch state
        - worker worktree is not shipped
        - PR URL or delivery-blocked reason is reported
      failure_signals:
        - graph audit proof-complete treated as terminal when PR delivery was requested
        - $ship receives worker worktree instead of integrated branch
        - public PR side effect occurs without PR intent
      rationale: $actuating includes delivery for plan-to-PR runs; proof-complete is implementation closure, not PR delivery closure.
  instrumentation:
    decision_receipt: required
    rationale: Claim, mutation authority, integration, and delivery choices are material.
