skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: actuating
    kind: mixed
    source_fingerprint: actuating-live-semantics-v1
  triggers:
    - trigger_id: ACT-IMPLEMENT
      description: Bare invocation runs implement, ship, review-closeout, then final closure; explicit implement stops after implementation.
      cue_literals: [$actuating, /goal $actuating, $actuating implement, implement accepted work, execute accepted plan]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-REVIEW
      description: Review should default to no-code triage unless mutation is explicit.
      cue_literals: [review, triage, remediation-plan, review-closeout]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-RESOLVE
      description: Classified findings require an owner-boundary resolution before mutation.
      cue_literals: [review-resolution/v1, replacement-kernel, local-repair]
      cue_regexes: []
      exclusions: []
    - trigger_id: ACT-CLOSE
      description: A goal or implementation completion claim requires live closure recomputation.
      cue_literals: [closure-decision/v1, complete, ready-to-ship]
      cue_regexes: []
      exclusions: []
  routes:
    - route_id: ACT-RUN
      description: Create or continue an actuation-run/v1 under current authority.
      aliases: [actuation-run, execute]
      terminal: "no"
    - route_id: ACT-TRIAGE
      description: Classify review evidence without mutation.
      aliases: [triage, review-only]
      terminal: "yes"
    - route_id: ACT-REMEDIATION
      description: Produce review-resolution/v1 without selecting executable mutation.
      aliases: [remediation-plan]
      terminal: "yes"
    - route_id: ACT-REVIEW-CLOSEOUT
      description: Resolve findings, execute the current selected node, and acquire closure-grade review evidence.
      aliases: [review-closeout]
      terminal: "no"
    - route_id: ACT-CLOSURE
      description: Recompute closure-decision/v1 from current joined evidence.
      aliases: [closure, complete]
      terminal: "yes"
    - route_id: ACT-SHIP-HANDOFF
      description: Hand implementation to the sole public-effect owner, then continue bare invocation into review-closeout.
      aliases: [ship-handoff]
      terminal: "no"
    - route_id: ACT-BLOCK
      description: Stop on missing authority, stale binding, unresolved review, invalid proof, or unsupported coordination.
      aliases: [blocked]
      terminal: "yes"
  clauses:
    - clause_id: ACT-AUTHORITY-001
      trigger_refs: [ACT-IMPLEMENT]
      expected_routes: [ACT-RUN, ACT-SHIP-HANDOFF, ACT-REVIEW-CLOSEOUT, ACT-CLOSURE, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts: [actuation-run/v1, current source and artifact binding, selected step before mutation]
      success_signals: [scope source remains distinct from execution authority, bare invocation orders implement then ship then review-closeout then final closure, explicit implement stops after implementation]
      failure_signals: [plan grants mutation by itself, bare invocation skips or reorders a phase, ship handoff terminates bare invocation, explicit implement publishes or enters review-closeout, unsupported controller is simulated]
      rationale: Execution authority belongs to the run, while invocation syntax selects the ordered lifecycle boundary.
    - clause_id: ACT-REVIEW-001
      trigger_refs: [ACT-REVIEW]
      expected_routes: [ACT-TRIAGE, ACT-REMEDIATION, ACT-REVIEW-CLOSEOUT, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts: [current review source, review-fold classification before review resolution]
      success_signals: [unqualified review selects triage, explicit closeout is required for review-derived mutation]
      failure_signals: [raw finding becomes a patch, no-code mode selects a work node]
      rationale: Review evidence is not mutation authority.
    - clause_id: ACT-RESOLUTION-001
      trigger_refs: [ACT-RESOLVE]
      expected_routes: [ACT-RUN, ACT-REVIEW-CLOSEOUT, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts: [review-resolution/v1, owner-boundary strategy, abstraction account, semantic balance]
      success_signals: [one selected owner node, all added constructs replace named constructs]
      failure_signals: [one node per comment, local repair adds machinery, dominated abstraction remains]
      rationale: Resolution should remove the owning cause instead of accumulating review patches.
    - clause_id: ACT-CLOSURE-001
      trigger_refs: [ACT-CLOSE]
      expected_routes: [ACT-CLOSURE, ACT-SHIP-HANDOFF, ACT-BLOCK]
      prohibited_routes: []
      required_artifacts: [closure-decision/v1, current evidence folds, actual CAS records when review is required]
      success_signals: [goal and implementation outcomes are separate, three standard attempts are derived from distinct records]
      failure_signals: [opaque proof reference, scalar clean count, replayed completion decision, proof-patch precedes closure]
      rationale: Completion must be a live join over current evidence.
  instrumentation:
    decision_receipt: required
    rationale: Run admission, review resolution, and closure determine mutation and completion legality.
