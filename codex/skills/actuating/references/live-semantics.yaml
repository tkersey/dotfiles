live_semantics:
  schema_version: live-semantics/v1
  safe_review_default: triage

  invocation_defaults:
    bare: [implement, ship, review-closeout, final-closure]
    explicit-implement: [implement]

  modes:
    implement:
      mutation: authority-bound
      material: true
      implementation_outcome: complete
    triage:
      mutation: forbidden
      material: false
      implementation_outcome: not-applicable
    remediation-plan:
      mutation: forbidden
      material: false
      implementation_outcome: not-applicable
    review-closeout:
      mutation: resolution-bound
      material: true
      implementation_outcome: complete

  source_kinds:
    - accepted-spec
    - direct-goal

  execution_kinds:
    - none
    - direct
    - iterative

  step_effects:
    - inspect
    - edit
    - verify

  canonical_objects:
    actuation-run/v1:
      owner: goal-actuating
      purpose: Bind source, immutable invocation lifecycle, authority, continuous artifact history, admitted steps, and evidence.
    review-resolution/v1:
      owner: actuating
      purpose: Turn classified findings into owner-boundary strategies and selected work.
    closure-decision/v1:
      owner: actuating
      purpose: Recompute goal and implementation outcomes from live joined evidence.

  owners:
    source_semantics: spec-pipeline
    execution_policy: plan
    goal_contract: goal-contract
    topology_advice: agent-loop-schemes
    coordinator: goal-actuating
    selected_step_executor: goal-grind
    work_projection: goal-workgraph
    evidence_reducer: evidence-fold
    review_transport: cas
    review_classifier: review-fold
    resolution: actuating
    final_proof_view: proof-patch
    public_effects: ship

  strategies:
    - local-repair
    - replacement-kernel
    - blocked

  abstraction_dispositions:
    - retain
    - retire
    - collapse
    - delegate
    - replace

  change_surfaces:
    public-interface: {}
    defaults-and-fallbacks: {}
    permissions-and-persistence: {}
    lifecycle-and-partial-success: {}
    state-and-transitions: {}
    ownership-and-validation: {}
    concurrency-retry-idempotency: {}
    cache-and-stale-handles: {}
    abstraction-change: {}
    replacement-kernel: {}
    repeated-liabilities: {}
    multi-live-path: {}
    new-named-machinery: {}
    semantic-surface-not-shrinking: {}

  lens_contracts:
    standard: standard-review-v1

  invariants:
    - id: authority-before-mutation
      statement: Material mutation requires a current authority-bound run.
    - id: selected-step-before-mutation
      statement: Material mutation requires one lead-selected step.
    - id: generic-admission-before-action
      statement: Every executable action preserves a gate-derived step admission binding its profile phase predecessor state effect owner paths and verifier.
    - id: evidence-before-continuation
      statement: Continuation requires a completed step and current evidence fold.
    - id: review-before-resolution
      statement: Review-derived mutation requires classified findings and a current resolution.
    - id: review-admission-before-mutation
      statement: A review edit embeds the gate-derived review-admission receipt with the full resolution observer facts and optional prior SHIP snapshot before mutation and preserves it thereafter.
    - id: live-review-source-before-admission
      statement: Every review repair admission follows a live source refresh and a newly folded producer batch for the current local artifact.
    - id: same-publication-continuation-derived
      statement: An adjacent review repair under an unchanged SHIP is admitted only by the gate-derived continuation receipt with injective stable finding semantics and source producer lineage, fresh fold and batch identities supporting every introduced finding, and predecessor evidence-content binding.
    - id: review-history-survives-reship
      statement: A replacement SHIP resets publication-local proof credit but every later repair admission preserves cumulative finding and source history while strictly extending the finding set.
    - id: terminal-resolution-exact
      statement: After a publication-bearing repair clean cannot erase history; a resolved refold matches exactly the admitted material finding set, preserves source producer lineage, and supports every finding with fresh review input while a new finding remains pending.
    - id: review-mode-profile-alignment
      statement: Review-required execution uses review-closeout and cannot be relabeled as implement.
    - id: observable-index-before-mutation
      statement: Assume-unchanged and skip-worktree flags in the root or any initialized gitlink index block every live binding.
    - id: declared-semantic-accounting
      statement: Declared added constructs require live obligations and distinct displaced constructs; independent construct discovery is not claimed.
    - id: distinct-standard-suffix
      statement: Standard closure derives from three distinct ordered current clean attempts.
    - id: public-effects-owned-by-ship
      statement: Only ship may perform PR or public tracker effects.
    - id: ship-precedes-review-closeout
      statement: Publication-bearing review-closeout validates an embedded immutable SHIP-v1 before admission; adjacent same-publication repairs remain local until resolution and the final repair publication updates that same retained PR URL.
    - id: repair-reship-resets-cas
      statement: Republishing the resolved repair head resets CAS credit to zero and final closure requires three fresh ordered standard attempts.
    - id: pr-publication-watermark-before-cas
      statement: Publication-bound CAS credit uses monotone pre-list observations and a stable post-list live PR updatedAt watermark; a regressing observation blocks closure, records at or before the greatest observation are superseded, duplicate record and producer attempt identities are invalid across epochs, and a later PR metadata update resets the clean suffix while findings remain classification obligations.
    - id: closure-is-live
      statement: Completion is recomputed from current repository state and joined evidence.
    - id: resolved-node-history
      statement: Every node in a resolved resolution matches exactly one completed admitted edit.

  quotient:
    removed_semantic_classes:
      - transaction-controller overlay
      - pre-action proof of a post-action fold
      - scalar clean-review counters
      - replayable completion approval
      - final resolution as mutation admission
      - relabeled SHIP review epoch
      - null review-field sentinels in SHIP
      - self-attested proof and success flags
      - duplicate recursive coordinator
      - proof and closure dependency cycle
      - one-patch-per-comment escalation artifacts
      - caller-authored publication-continuation authority
      - single-use same-publication exception
      - runtime-history documentation

  closure_flow:
    bare_lifecycle: [implement, ship, review-closeout, final-closure]
    ship_handoff:
      when: implementation-ready-to-ship
      action: ship
      terminal: false
      records: implementation-checkpoint/v1
      then: same-run-review-closeout
    review_closeout:
      requires_when: publication-requested
      receipt: pre-review-SHIP-v1
      before_repair_admission: [refresh-live-review-sources, review-fold, review-resolution]
      after_edit:
        unresolved: [evidence-fold, refresh-live-review-sources, review-fold, review-resolution, gate-derived-continuation]
        resolved: [evidence-fold, current-resolved-refold, ship, reset-cas-credit, review-closeout]
      then: final-closure
    final_closure: closure-decision/v1
    terminal_view: final-proof-patch
