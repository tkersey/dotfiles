live_semantics:
  schema_version: live-semantics/v1
  safe_review_default: triage

  invocation_defaults:
    bare: [implement, ship, review-closeout, final-closure]
    explicit-implement: [implement]

  modes:
    implement:
      mutation: authority-bound
      material: true
      implementation_outcome: complete
    triage:
      mutation: forbidden
      material: false
      implementation_outcome: not-applicable
    remediation-plan:
      mutation: forbidden
      material: false
      implementation_outcome: not-applicable
    review-closeout:
      mutation: resolution-bound
      material: true
      implementation_outcome: complete

  source_kinds:
    - accepted-spec
    - direct-goal

  execution_kinds:
    - none
    - direct
    - iterative

  step_effects:
    - inspect
    - edit
    - verify
    - review
    - resolve

  canonical_objects:
    actuation-run/v1:
      owner: goal-actuating
      purpose: Bind source, authority, artifact state, selected steps, and evidence.
    review-resolution/v1:
      owner: actuating
      purpose: Turn classified findings into owner-boundary strategies and selected work.
    closure-decision/v1:
      owner: actuating
      purpose: Recompute goal and implementation outcomes from live joined evidence.

  owners:
    source_semantics: spec-pipeline
    execution_policy: plan
    goal_contract: goal-contract
    topology_advice: agent-loop-schemes
    coordinator: goal-actuating
    selected_step_executor: goal-grind
    work_projection: goal-workgraph
    evidence_reducer: evidence-fold
    review_transport: cas
    review_classifier: review-fold
    resolution: actuating
    final_proof_view: proof-patch
    public_effects: ship

  strategies:
    - local-repair
    - replacement-kernel
    - blocked

  abstraction_dispositions:
    - retain
    - retire
    - collapse
    - delegate
    - replace

  change_surfaces:
    public-interface: {}
    defaults-and-fallbacks: {}
    permissions-and-persistence: {}
    lifecycle-and-partial-success: {}
    state-and-transitions: {}
    ownership-and-validation: {}
    concurrency-retry-idempotency: {}
    cache-and-stale-handles: {}
    abstraction-change: {}
    replacement-kernel: {}
    repeated-liabilities: {}
    multi-live-path: {}
    new-named-machinery: {}
    semantic-surface-not-shrinking: {}

  lens_contracts:
    standard: standard-review-v1

  invariants:
    - id: authority-before-mutation
      statement: Material mutation requires a current authority-bound run.
    - id: selected-step-before-mutation
      statement: Material mutation requires one lead-selected step.
    - id: evidence-before-continuation
      statement: Continuation requires a completed step and current evidence fold.
    - id: review-before-resolution
      statement: Review-derived mutation requires classified findings and a current resolution.
    - id: review-admission-before-mutation
      statement: A review edit embeds the gate-derived review-admission receipt with the full resolution observer facts and optional prior SHIP snapshot before mutation and preserves it thereafter.
    - id: review-mode-profile-alignment
      statement: Review-required execution uses review-closeout and cannot be relabeled as implement.
    - id: observable-index-before-mutation
      statement: Assume-unchanged and skip-worktree flags in the root or any initialized gitlink index block every live binding.
    - id: semantic-non-growth
      statement: Added semantic constructs require live obligations and displaced constructs.
    - id: distinct-standard-suffix
      statement: Standard closure derives from three distinct ordered current clean attempts.
    - id: public-effects-owned-by-ship
      statement: Only ship may perform PR or public tracker effects.
    - id: ship-precedes-review-closeout
      statement: Publication-bearing review-closeout validates an embedded immutable SHIP-v1 before admission and every repair publication updates that same retained PR URL.
    - id: closure-is-live
      statement: Completion is recomputed from current repository state and joined evidence.
    - id: resolved-node-history
      statement: Every node in a resolved resolution matches exactly one completed admitted edit.

  quotient:
    removed_semantic_classes:
      - transaction-controller overlay
      - pre-action proof of a post-action fold
      - scalar clean-review counters
      - replayable completion approval
      - final resolution as mutation admission
      - relabeled SHIP review epoch
      - null review-field sentinels in SHIP
      - self-attested proof and success flags
      - duplicate recursive coordinator
      - proof and closure dependency cycle
      - one-patch-per-comment escalation artifacts
      - runtime-history documentation

  isomorphism:
    live_obligations:
      - obligation_id: source-authority
        handler: validate_run
        representation: actuation-run.source
        inverse_observation: recover the accepted semantic source and execution authority
      - obligation_id: artifact-currentness
        handler: binding_errors
        representation: actuation-run.artifact
        inverse_observation: recover canonical Git root base branch head observable index and live-state fingerprint
      - obligation_id: mutation-admission
        handler: validate_run
        representation: actuation-run.execution.selected_step_id+steps.review_admission
        inverse_observation: recover the selected work item and its gate-derived review admission before mutation
      - obligation_id: continuation-proof
        handler: evidence_errors
        representation: actuation-run.execution.steps.evidence_fold_ref
        inverse_observation: recover the evidence that permits the next step
      - obligation_id: no-code-separation
        handler: validate_run
        representation: actuation-run.mode
        inverse_observation: recover whether implementation is applicable
      - obligation_id: review-classification
        handler: validate_resolution
        representation: review-resolution.review_folds
        inverse_observation: recover the classified source batch
      - obligation_id: owner-boundary-repair
        handler: validate_resolution
        representation: review-resolution.decisions
        inverse_observation: recover strategy alternatives falsifier and selected node
      - obligation_id: abstraction-account
        handler: validate_resolution
        representation: review-resolution.decisions.abstraction_account
        inverse_observation: recover why each participating abstraction remains or retires
      - obligation_id: semantic-balance
        handler: validate_resolution
        representation: review-resolution.outcome.semantic_balance
        inverse_observation: recover hunk liability construct and retirement coverage
      - obligation_id: independent-review-proof
        handler: cas_errors
        representation: closure-decision.review_basis
        inverse_observation: recover distinct producer-observed standard attempts
      - obligation_id: outcome-separation
        handler: decide
        representation: closure-decision.outcomes
        inverse_observation: recover goal implementation and next-owner outcomes
      - obligation_id: delivery-boundary
        handler: ship_errors
        representation: actuation-run.review.ship_receipt+closure-decision.ship_basis
        inverse_observation: recover whether immutable pre-review SHIP evidence acted on the current target before admission and at closure
      - obligation_id: fail-closed-coordination
        handler: validate_run
        representation: actuation-run.authority.unsupported_coordination_required
        inverse_observation: recover whether local actuation must block

  closure_flow:
    bare_lifecycle: [implement, ship, review-closeout, final-closure]
    ship_handoff:
      when: implementation-ready-to-ship
      action: ship
      terminal: false
      then: review-closeout
    review_closeout:
      requires_when: publication-requested
      receipt: pre-review-SHIP-v1
      after_edit: [current-resolved-refold, ship, review-closeout]
      then: final-closure
    final_closure: closure-decision/v1
    terminal_view: final-proof-patch
