live_semantics:
  schema_version: live-semantics/v1
  executable_authority: ledger --source actuation
  implementation_language: Zig
  safe_review_default: triage

  invocation_defaults:
    bare: [implement-generation, ship, review-generation, final-closure]
    explicit-implement: [implement-generation]

  modes:
    implement:
      mutation: authority-bound
      material: true
    triage:
      mutation: forbidden
      material: false
    remediation-plan:
      mutation: forbidden
      material: false
    review-closeout:
      mutation: resolution-bound
      material: true

  source_kinds: [accepted-spec, direct-goal]
  step_effects: [inspect, edit, verify]
  completion_routes: [complete, ready-to-ship]
  kernel_phases: [ready, prepared, effect_recorded, closed]

  canonical_objects:
    GC-v2:
      owner: goal-contract
      purpose: Bind accepted intent, authority, scope, terminal predicates, and verifiers.
    actuation-open/v1:
      owner: goal-actuating
      purpose: Project one GoalContract generation into immutable kernel authority and obligations.
    actuation-operation/v1:
      owner: goal-actuating
      purpose: Select one idempotent owner-boundary operation against outstanding obligations.
    actuation-event/v1:
      owner: ledger-actuation
      purpose: Record the append-only causal transition history.
    actuation-kernel-state/v1:
      owner: ledger-actuation
      purpose: Fold events into the current phase, artifact, pending operation, and obligation state.
    closure-decision/v1:
      owner: ledger-actuation
      purpose: Project continuation or terminal outcomes from the live folded state.
    review-resolution/v1:
      owner: actuating
      purpose: Turn classified findings into owner-boundary strategies before review mutation.

  recursion_scheme:
    driver: /goal
    coalgebra: actuation-kernel-state/v1 -> next_transition | terminal
    algebra: actuation-kernel-state/v1 x actuation-event/v1 -> actuation-kernel-state/v1
    handlers:
      edit: external admitted mutation followed by exact reconciliation
      inspect: kernel-executed admitted verifier
      verify: kernel-executed admitted verifier
    fixed_point_owner: /goal
    cli_transition_limit: one

  owners:
    source_semantics: spec-pipeline
    execution_policy: plan
    goal_contract: goal-contract
    coordinator: goal-actuating
    selected_step_executor: goal-grind
    evidence_reducer: evidence-fold
    review_transport: cas
    review_classifier: review-fold
    governance_validator: ledger-validate
    resolution: actuating
    kernel: ledger-actuation
    final_proof_view: proof-patch
    public_effects: ship

  strategies: [local-repair, replacement-kernel, blocked]
  abstraction_dispositions: [retain, retire, collapse, delegate, replace]

  invariants:
    - id: zig-only-executable-authority
      statement: Every actuation transition and closure decision is produced by ledger --source actuation; no second-language gate participates.
    - id: authority-before-open
      statement: A material generation opens only from a current source and explicit execution authority.
    - id: obligation-conservation
      statement: Close is unreachable until every obligation accepted at open has one passing kernel observation.
    - id: proof-basis-derivation
      statement: Every obligation declares an implementation review ship or acceptance kind and decide derives the corresponding basis from discharged state.
    - id: causal-admission
      statement: Every effect consumes a random capability issued against the exact pre-effect repository state.
    - id: idempotency
      statement: Step and idempotency identities are unique within a generation and cannot authorize another transition.
    - id: exact-path-reconciliation
      statement: An edit changes every declared path and no undeclared path while the capability is outstanding.
    - id: verifier-ownership
      statement: The kernel executes the verifier inherited from cited obligations and rejects caller success flags, substituted commands, and verifier-side repository mutation.
    - id: hash-chain-replay-integrity
      statement: Every event extends one monotonic predecessor-hashed chain and replays through the same total fold.
    - id: one-transition-per-invocation
      statement: The CLI performs at most one state transition; /goal alone owns repetition and stopping.
    - id: node-not-goal
      statement: A completed operation discharges obligations but never completes its parent goal.
    - id: immutable-terminal-route
      statement: complete or ready-to-ship is bound at open and projected only after close.
    - id: public-effects-owned-by-ship
      statement: Only ship may create update or promote a PR or perform another public tracker effect.
    - id: review-before-resolution
      statement: Review-derived mutation requires fresh classified evidence, a passing pure $ledger run -- validate review-fold decision, and a current owner-boundary review-resolution/v1; validation grants no authority.
    - id: closure-is-live
      statement: Close and decide recompute the current repository artifact and reject stale folded state.

  obstruction:
    primitive: in-app edit
    statement: A repo-local process cannot intercept Codex mutation primitives; it proves pre-effect admission and post-effect reconciliation rather than OS-level confinement.
    lost_capability: blocks

  quotient:
    removed_semantic_classes:
      - mutable actuation-run yaml as a second truth source
      - deterministic post-hoc admission
      - caller-authored success flags
      - scalar clean-review counters
      - replayable completion approval
      - duplicate recursive coordinator
      - retired second-language actuation gate

  closure_flow:
    open: actuation-open/v1
    iterate: [/goal-observe, one-kernel-transition]
    close: $ledger run -- close --source actuation
    decision: $ledger run -- decide --source actuation
    ship_handoff:
      when: closed-ready-to-ship-generation
      owner: ship
      terminal: false
    final_closure:
      when: closed-complete-generation
      artifact: closure-decision/v1
    terminal_view: proof-patch
