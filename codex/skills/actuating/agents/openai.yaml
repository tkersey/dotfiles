policy:
  allow_implicit_invocation: false
interface:
  display_name: "Actuating"
  short_description: "Explicit /goal workflow with ALSR/HYL loop governance and terminal ATCG closure"
  default_prompt: >-
    Use $actuating as the explicit /goal workflow. First get an accepted
    implementation spec from $spec-pipeline in gate-only/no-plan mode when one is
    not already available. Use $recursion-scheme-planner when topology is
    nontrivial. For material recursive work, require $agent-loop-schemes to emit
    ALSR-v1 and HYL-v1 before mutation unless the run is direct-action fused or
    blocked external coordination. $goal-actuating interprets HYL-v1 and emits HSR-v1 steps. For
    review requests, default to review-closeout unless the user names triage,
    remediation-plan, or another no-implementation mode. Fresh or exhaustive
    workflow review must use $cas review, findings must pass through
    $review-fold, and only accepted code-change liabilities may reach
    implementation. When repeated accepted liabilities share an owner boundary,
    missing abstraction, invariant, proof surface, or misuse trap, emit an
    AER-v1 actuation_escalation_receipt with owner_boundary,
    repeated_finding_class, accepted_liabilities, prior_resolution_mode,
    next_resolution_mode, escalation_trigger, alternatives_considered,
    selected_route, verifier, and current_artifact_scope before further
    mutation. If selected_route or next_resolution_mode is refactor-kernel,
    validate the AER-v1 before mutation and emit an RKO-v1
    refactor_kernel_outcome after proof/review that records covered liabilities,
    new liabilities, closure state, and graph-bypass/mutation-without-control
    evidence. Completion requires terminal ATCG-v1.
