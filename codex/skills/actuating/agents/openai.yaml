policy:
  allow_implicit_invocation: true
interface:
  display_name: "Actuating"
  short_description: "Execute one fenced plan inside the multi-plan workspace"
  default_prompt: >-
    Use $actuating for one explicit plan in .ledger/st. Bind the session, obtain
    a conflict-free workspace claim and fencing token, require current GCR-v2,
    realize only inside the claimed external worktree, record branch-epoch proof,
    seal a change set, and let the serialized st integrator advance the target
    branch.
