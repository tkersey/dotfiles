policy:
  allow_implicit_invocation: true
interface:
  display_name: "Actuating"
  short_description: "Interpret one execution-policy horizon through GCR and ASL"
  default_prompt: >-
    Use $actuating as a closed-loop EPG interpreter. Validate the current
    policy and state, select one EPD action, materialize only its commitment
    horizon into canonical $st, require current GCR and policy-bound ASL/FPS
    for mutation, record proof and ETR predicted-versus-observed evidence,
    advance EPS atomically, and ship only from a proven success terminal.
