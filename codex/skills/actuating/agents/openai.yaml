policy:
  allow_implicit_invocation: false
interface:
  display_name: "Actuating"
  short_description: "Workflow facade for $spec-pipeline -> $goal-actuating"
  default_prompt: >-
    Use $actuating as an explicit /goal workflow facade. First establish semantic
    closure with $spec-pipeline when an accepted SGR-v2/spec is not already
    present, then hand the accepted spec to $goal-actuating. $actuating chooses
    direct-goal, spec-first, review-first, dry-plan, or st-governed mode, but it
    does not directly mutate code. Review pressure must pass through
    $review-fold before implementation. Use st-governed mode only when durable
    claims, fencing, worktrees, serialized integration, or existing $st state
    must own execution.
