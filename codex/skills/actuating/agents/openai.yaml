policy:
  allow_implicit_invocation: true
interface:
  display_name: "Actuating"
  short_description: "Execute one fenced plan inside the multi-plan workspace"
  default_prompt: >-
    Use $actuating as a transaction controller for one explicit plan in
    .ledger/st. Bind the session, obtain a conflict-free workspace claim and
    fencing token, require current GCR-v2, and emit APMA-v1 before any
    actuation-labeled patch. No APMA-v1 with mutation-authorized verdict means
    no apply_patch, no editor write, no shell mutation, no proof write, and no
    changeset seal under $actuating. If GCR-v2 denies execution because compile
    made the session view, plan sequence, workspace sequence, or branch epoch
    stale, stop immediately, release held claims when safe, mark actuation
    blocked on tooling, and do not continue as $actuating. Realize only inside
    the claimed external worktree, record branch-epoch proof, seal a change set,
    and let the serialized st integrator advance the target branch.
