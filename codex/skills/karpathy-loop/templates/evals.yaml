# Binary eval checklist template.
# Each criterion should be yes/no and observable.

evals:
  - eval_id: E01
    name: Format adherence
    question: Does the output follow the requested format?
    type: deterministic_or_judge
    weight: 1
    pass_condition: The output matches the required structure and includes all required sections or fields.
    fail_condition: The output omits required sections, adds forbidden sections, or ignores the requested structure.

  - eval_id: E02
    name: Direct answer
    question: Does the output answer the actual user request?
    type: judge
    weight: 1
    pass_condition: The output directly addresses the input without substituting a different task.
    fail_condition: The output is generic, tangential, or fails to complete the requested task.

  - eval_id: E03
    name: Grounding
    question: Does the output avoid unsupported claims?
    type: judge
    weight: 1
    pass_condition: Claims are grounded in the provided input or clearly marked as assumptions.
    fail_condition: The output invents details, cites absent evidence, or overstates certainty.

  - eval_id: E04
    name: Usefulness
    question: Does the output provide a concrete, useful next step or deliverable?
    type: judge
    weight: 1
    pass_condition: The output gives a specific artifact, recommendation, action, or answer that the user can use.
    fail_condition: The output stays abstract, vague, or purely explanatory when a deliverable is needed.
