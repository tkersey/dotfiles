skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: plan
    kind: workflow
    source_fingerprint: plan-v4.1-policy-synthesis-fixed-point
  triggers:
    - trigger_id: PLAN-COMPILE
      description: Accepted intent needs a named execution policy.
      cue_literals: [$plan, ready_for_plan, execution policy]
      cue_regexes: []
      exclusions: []
    - trigger_id: PLAN-RELATION
      description: A dependency on another plan is discovered.
      cue_literals: [cross-plan dependency, another plan]
      cue_regexes: []
      exclusions: []
    - trigger_id: PLAN-SYNTHESIS
      description: The execution policy must be refined to a fixed point.
      cue_literals: [iterate, improve the plan, exhaustive refinement, creativity pass]
      cue_regexes: []
      exclusions: []
  routes:
    - route_id: PLAN-EMIT
      description: Emit one named plan policy and `$st` handoff.
      aliases: [emit]
      terminal: "yes"
    - route_id: PLAN-REFINE
      description: Continue internal policy synthesis because a material improvement remains.
      aliases: [refine]
      terminal: "no"
    - route_id: PLAN-RETURN-SPEC
      description: Return a semantic gap.
      aliases: [return-to-spec]
      terminal: "yes"
    - route_id: PLAN-RETURN-GRILL
      description: Return an unresolved user judgment.
      aliases: [return-to-grill]
      terminal: "yes"
    - route_id: PLAN-BLOCK
      description: Block because identity, authority, convergence, or evidence is unavailable.
      aliases: [blocked]
      terminal: "yes"
  clauses:
    - clause_id: PLAN-ID-001
      trigger_refs: [PLAN-COMPILE]
      expected_routes: [PLAN-EMIT, PLAN-REFINE, PLAN-RETURN-SPEC, PLAN-RETURN-GRILL, PLAN-BLOCK]
      prohibited_routes: []
      required_artifacts:
        - immutable plan_id
        - source digest
        - target branch
      success_signals:
        - explicit `.ledger/st` handoff
      failure_signals:
        - plan inferred from current `$st` state
      rationale: Plan identity is the unit of namespace isolation.
    - clause_id: PLAN-CROSS-001
      trigger_refs: [PLAN-RELATION]
      expected_routes: [PLAN-EMIT, PLAN-REFINE, PLAN-RETURN-SPEC, PLAN-RETURN-GRILL, PLAN-BLOCK]
      prohibited_routes: []
      required_artifacts:
        - proposed qualified cross-plan edge
      success_signals:
        - edge remains a proposal until accepted by `$st`
      failure_signals:
        - foreign work copied into current plan
      rationale: Cross-plan authority belongs to the workspace.
    - clause_id: PLAN-SYNTHESIS-001
      trigger_refs: [PLAN-COMPILE, PLAN-SYNTHESIS]
      expected_routes: [PLAN-REFINE, PLAN-EMIT, PLAN-RETURN-SPEC, PLAN-RETURN-GRILL, PLAN-BLOCK]
      prohibited_routes: []
      required_artifacts:
        - PSR-v1
        - complete clean sweep
        - independent press pass
      success_signals:
        - final policy digest differs only when material improvements were adopted
        - no public iteration log is needed for readiness
      failure_signals:
        - one-shot plan emitted without synthesis receipt
      rationale: Planning quality depends on exhaustive refinement, not just schema presence.
    - clause_id: PLAN-CREATIVITY-001
      trigger_refs: [PLAN-COMPILE, PLAN-SYNTHESIS]
      expected_routes: [PLAN-REFINE, PLAN-EMIT, PLAN-RETURN-SPEC, PLAN-BLOCK]
      prohibited_routes: []
      required_artifacts:
        - radical candidate disposition
      success_signals:
        - candidate generated and adopted/rejected/deferred/routed with evidence
      failure_signals:
        - arbitrary addition after convergence
        - no radical candidate attempted
      rationale: Creativity is mandatory; accretion is optional.
  instrumentation:
    decision_receipt: required_for_material_routes
    rationale: Plan identity, cross-plan relationships, synthesis convergence, and radical-candidate disposition shape execution.
