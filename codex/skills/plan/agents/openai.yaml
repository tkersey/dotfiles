policy:
  allow_implicit_invocation: false
interface:
  display_name: "Plan"
  short_description: "Compile intent into a named multi-plan execution policy"
  default_prompt: >-
    Use $plan to compile accepted intent into a source-bound execution policy
    with an immutable plan_id, explicit resource predictions, proof, rollback,
    and a handoff to the .ledger/st workspace. Never infer an existing plan or
    grant mutation authority.
