policy_synthesis_receipt:
  receipt_version: PSR-v1
  plan_id: cas-review-proof-normalization
  revision: 1
  source_digest: sha256:source
  source_contract:
    kind: PSC-v1
    source_owner: spec-pipeline
    spec_id: cas-review-proof
    sgr_digest: sha256:sgr
  initial_policy_digest: sha256:initial
  final_policy_digest: sha256:final
  passes:
    - pass_id: p1
      lens: source fidelity
      candidate_digest_before: sha256:initial
      candidate_digest_after: sha256:after-source
      findings: []
      material_changes: []
      disposition: clean
    - pass_id: p2
      lens: action and resource-boundary completeness
      candidate_digest_before: sha256:after-source
      candidate_digest_after: sha256:final
      findings: []
      material_changes: []
      disposition: clean
  radical_candidate:
    candidate: "Unify start --wait and lane review under one normalized receipt gate."
    disposition: adopt
    reason: "Improves execution proof without changing source semantics."
    affected_refs: []
  convergence:
    complete_clean_sweep: true
    independent_press_pass_clean: true
    unresolved_errors: []
    untreated_material_risks: []
    improvements_exhausted: true
