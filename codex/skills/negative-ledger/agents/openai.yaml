policy:
  allow_implicit_invocation: true
interface:
  display_name: "Negative Ledger"
  short_description: "Recall and prune witnessed failed routes and regressions"
  default_prompt: "Use $negative-ledger implicitly when implementation, debugging, review, or validation encounters a witnessed failed or no-effect route, benchmark or test regression, revert, repeated same-cluster retry, abandoned strategy, or a question about what has already been tried. Query or map before repeating a route, and treat transient failures and first incomplete attempts as no-op. Keep the exact current pre-route map separate from the Ledger lifecycle checkpoint. In checkpoint context, return one source and one admission disposition without recursive coordination; admit only complete, recurrent, useful native projections."
