policy:
  allow_implicit_invocation: true
interface:
  display_name: "Goal Actuating"
  short_description: "Run accepted specs or direct goals through goal contract, work list, review, evidence, and proof"
  default_prompt: >-
    Use $goal-actuating to execute an accepted implementation spec, direct /goal,
    review-first remediation, dry actuation plan, or $st-governed execution.
    Treat the accepted spec as the source of truth, derive a goal contract, choose
    update_plan, goal-artifacts, or $st persistence, and keep the loop focused on
    the next useful action. Fresh or exhaustive review must use $cas review; then
    route findings through $review-fold. Close with evidence-fold and
    proof-patch.
