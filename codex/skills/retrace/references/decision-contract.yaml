skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: retrace
    kind: mixed
    source_fingerprint: generated-with-retrace-v1.1-source-governance
  triggers:
    - trigger_id: RETRACE-HISTORICAL-WHY
      description: The user asks why a prior session made a consequential decision.
      cue_literals:
        - why did that session
        - replay the decision
        - counterfactual decision
      cue_regexes: []
      exclusions:
        - summarize the session only
    - trigger_id: RETRACE-WORKFLOW-GOVERNANCE
      description: The source was selected by a workflow audit or the inquiry asks whether a workflow governed the session.
      cue_literals:
        - did resolve govern
        - true C3 session
        - review-compiler source
        - workflow intervention
      cue_regexes: []
      exclusions:
        - direct session summary with no workflow claim
    - trigger_id: RETRACE-SKILL-EFFECT
      description: The user asks whether a skill or instruction changed a historical route.
      cue_literals:
        - did the skill change the decision
        - instruction effect
        - skill ablation
      cue_regexes: []
      exclusions: []
    - trigger_id: RETRACE-RETROSPECTIVE
      description: The user asks what should be learned after outcomes are known.
      cue_literals:
        - in hindsight
        - what should we learn
        - retrospective
      cue_regexes: []
      exclusions: []
  routes:
    - route_id: RETRACE-GOVERNANCE-BLOCK
      description: Stop replay because workflow evidence is incidental, ambiguous, or absent.
      aliases:
        - source-governance-stop
        - classifier-false-positive
      terminal: "yes"
    - route_id: RETRACE-DETERMINISTIC
      description: Use source trace evidence only.
      aliases:
        - audit
        - no-fork
      terminal: "yes"
    - route_id: RETRACE-POSITIVE-CONTROL
      description: Run one exact outcome-blind replay to prove FIR transport.
      aliases:
        - positive-control
      terminal: "yes"
    - route_id: RETRACE-COMPARE
      description: Run a bounded baseline/intervention experiment.
      aliases:
        - compare
        - replay
      terminal: "yes"
    - route_id: RETRACE-HINDSIGHT
      description: Run a clearly labeled outcome-aware retrospective.
      aliases:
        - retrospective
      terminal: "yes"
    - route_id: RETRACE-BLOCKED
      description: Stop because source, anchor, permissions, runtime, or workspace cannot be proven.
      aliases:
        - blocked
      terminal: "yes"
  clauses:
    - clause_id: RETRACE-GOVERNANCE-001
      trigger_refs:
        - RETRACE-WORKFLOW-GOVERNANCE
        - RETRACE-SKILL-EFFECT
      expected_routes:
        - RETRACE-GOVERNANCE-BLOCK
        - RETRACE-DETERMINISTIC
        - RETRACE-POSITIVE-CONTROL
        - RETRACE-COMPARE
        - RETRACE-BLOCKED
      prohibited_routes:
        - RETRACE-HINDSIGHT
      required_artifacts:
        - SGG-v1
        - exact included-session row or source evidence
        - provenance roles
      success_signals:
        - artifact/path mentions are not treated as workflow activation
        - generic delivery completion is not controller closure
      failure_signals:
        - replay run on an incidental workflow mention
        - aggregate count used as source identity
      rationale: Workflow-specific replay must prove that the workflow governed the source.
    - clause_id: RETRACE-EPISTEMIC-001
      trigger_refs:
        - RETRACE-HISTORICAL-WHY
        - RETRACE-SKILL-EFFECT
        - RETRACE-RETROSPECTIVE
      expected_routes:
        - RETRACE-DETERMINISTIC
        - RETRACE-POSITIVE-CONTROL
        - RETRACE-COMPARE
        - RETRACE-HINDSIGHT
        - RETRACE-BLOCKED
      prohibited_routes: []
      required_artifacts:
        - DCP-v1
        - explicit evidence classes
        - limitations
      success_signals:
        - historical and replay evidence remain separate
      failure_signals:
        - hidden chain-of-thought claim
        - consensus treated as historical fact
      rationale: Replays are new experiments, not access to private historical reasoning.
    - clause_id: RETRACE-ANCHOR-001
      trigger_refs:
        - RETRACE-HISTORICAL-WHY
        - RETRACE-SKILL-EFFECT
      expected_routes:
        - RETRACE-POSITIVE-CONTROL
        - RETRACE-COMPARE
        - RETRACE-BLOCKED
      prohibited_routes:
        - RETRACE-HINDSIGHT
      required_artifacts:
        - exact outcome-blind anchor
        - thread_fork or rollout_transcript lineage
        - FIR-v1
      success_signals:
        - no later outcome visible to outcome-blind lane
      failure_signals:
        - full-history prompt-only outcome suppression
      rationale: Outcome blindness must be structural.
    - clause_id: RETRACE-STAGING-001
      trigger_refs:
        - RETRACE-HISTORICAL-WHY
        - RETRACE-SKILL-EFFECT
      expected_routes:
        - RETRACE-POSITIVE-CONTROL
        - RETRACE-COMPARE
        - RETRACE-BLOCKED
      prohibited_routes: []
      required_artifacts:
        - one valid FIR before multi-lane expansion
        - fork budget
      success_signals:
        - baseline/intervention run before challenger fanout
      failure_signals:
        - seven-lane experiment before transport validation
      rationale: Staged fanout prevents expensive experiments on invalid sources or broken transport.
    - clause_id: RETRACE-SAFETY-001
      trigger_refs:
        - RETRACE-HISTORICAL-WHY
        - RETRACE-SKILL-EFFECT
        - RETRACE-RETROSPECTIVE
      expected_routes:
        - RETRACE-DETERMINISTIC
        - RETRACE-POSITIVE-CONTROL
        - RETRACE-COMPARE
        - RETRACE-HINDSIGHT
        - RETRACE-BLOCKED
      prohibited_routes: []
      required_artifacts:
        - read-only permissions
        - no-network policy
        - cleanup status
      success_signals:
        - ephemeral bounded replay
      failure_signals:
        - mutation approval
        - uncontrolled replay proliferation
      rationale: Historical inquiry must not create operational side effects.
  instrumentation:
    decision_receipt: optional
    rationale: SGG/DCP/FIR/DRR artifacts capture material decisions.
