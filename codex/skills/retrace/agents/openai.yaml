policy:
  allow_implicit_invocation: true
interface:
  display_name: "Retrace"
  short_description: "Replay decisions after proving source governance"
  default_prompt: "Use $retrace to prove the claimed workflow governed the source, freeze the decision with $seq, run a staged read-only replay through $cas using thread-fork or rollout-transcript lineage, separate historical and hindsight evidence, and emit a cautious DRR-v1."
