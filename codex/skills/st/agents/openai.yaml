policy:
  allow_implicit_invocation: true
interface:
  display_name: "st"
  short_description: "Multi-plan graph workspace and conflict-free execution"
  default_prompt: >-
    Use $st as the repository-level workspace under .ledger/st. Keep each plan
    graph independent, bind the current session to one plan, obtain a global
    resource claim and fencing token, compile GCR-v2, project only the
    session-local aperture, record proof with branch-epoch lineage, and route
    all target-branch integration through the serialized workspace queue.
