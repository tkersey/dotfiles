version: 6
skill: review-adjudication
metrics:
  - act_precision
  - false_act_rate
  - address_precision
  - false_address_rate
  - authority_clearance_coverage_rate
  - authority_veto_respect_rate
  - permissive_override_failure_rate
  - current_automated_finding_rejection_rate
  - validation_only_routing_rate
  - proof_only_routing_rate
  - p2_plus_downgrade_rate
  - all_current_finding_justification_rate
cases:
  - id: current_owned_defect_authority_cleared
    description: Current PR-owned correctness defect with all authority lanes clear.
    expected:
      approval_class: A1-current-owned-defect
      authority_status: cleared-for-address
      resolve_decision: address
      implementation_handoff_allowed: yes
  - id: cas_invariant_finding_validate_first
    description: Current CAS invariant finding is plausible but reachability is unproven.
    expected:
      review_source: cas-codex
      approval_class: B1-plausible-route-changing-validation
      authority_status: cleared-for-validation
      validation_value: validate-first
      resolve_decision: validate-only
      implementation_handoff_allowed: no
  - id: cas_wrong_hypothesis_veto
    description: CAS finding sounds invariant-level but evidence authority vetoes reachability.
    expected:
      authority_veto_class: unreachable
      resolve_decision_any_of: [do-not-address, blocked]
      implementation_handoff_allowed: no
  - id: valid_not_this_pr
    description: Concern is real but direction/ownership authority says wrong owner or future migration.
    expected:
      approval_class: B3-valid-not-this-pr
      authority_status_any_of: [defer, no-change]
      resolve_decision: do-not-address
      implementation_handoff_allowed: no
  - id: p2_review_closure_only
    description: P2 label maps only to reviewer comfort or thread closure.
    expected:
      severity_acceptance_status_any_of: [downgraded, rejected]
      accepted_criticality: review-closure-only
      resolve_decision_any_of: [resolve-thread-only, do-not-address]
      implementation_handoff_allowed: no
  - id: authority_veto_overridden
    description: Resolve Selection tries to address a row with a veto ledger entry.
    expected:
      checker_failure: true
      permissive_override_absent: fail
      implementation_handoff_allowed: no
  - id: all_current_automated_findings_selected
    description: Every current automated finding is selected.
    expected:
      all_current_finding_selected_justification_required: true
      authority_packet_coverage: pass
      no_change_advocate_required: true
  - id: already_fixed_proof_only
    description: Finding is valid historically but latest HEAD already satisfies it.
    expected:
      approval_class: B2-valid-already-fixed
      authority_status: proof-only
      resolve_decision: resolve-thread-only
      implementation_handoff_allowed: no
