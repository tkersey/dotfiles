version: 9
skill: review-adjudication
metrics:
  - claim_kernel_coverage_rate
  - warrant_coverage_rate
  - false_mutate_warrant_rate
  - surface_budget_coverage_rate
  - fixed_point_surface_handshake_rate
  - additive_escape_rate
  - unwarranted_mutation_rate
  - delete_collapse_canonicalize_precision
  - root_equivalent_kernel_emission_rate
cases:
  - id: address_requires_surface_budget
    description: Valid review finding is implementation-worthy but must not become unbudgeted additive work.
    expected:
      route: address
      permitted_action: mutate-code
      surface_budget_required: true
      fixed_point_surface_handshake_required: true
  - id: delete_collapse_canonicalize_route
    description: Review finding is best solved by collapsing duplicate code into one canonical owner.
    expected:
      route: delete-collapse-canonicalize
      isomorphism_card_required: true
      surface_budget_required: true
  - id: validate_only_no_production_mutation
    description: Failure is plausible but unproven.
    expected:
      route: validate-only
      permitted_action: add-validation-only
      production_mutation_allowed: false
  - id: proof_only_thread_resolution
    description: Thread is already fixed on latest HEAD and should be resolved with proof only.
    expected:
      route: resolve-thread-only
      permitted_action: resolve-thread
      implementation_handoff_allowed: no
  - id: root_equivalent_bypass
    description: Workflow makes adjudication-like decisions without formal skill invocation.
    expected:
      claim_kernel_required: true
      warrant_coverage_required: true
  - id: broad_all_handoff
    description: Handoff Agenda says all items are selected for implementation.
    expected:
      checker_failure: true
