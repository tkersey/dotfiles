    subagents_may_not_complete_goal: yes
  interpreter:
    owner: $goal-actuating
    allowed_effects: []
  algebra:
    name:
    folds: []
    emits: continue|complete|blocked|regress|replan|refactor-kernel
  terminal:
    completion_requires: ATCG-v1
    proof_must_bind_current_artifact: yes
