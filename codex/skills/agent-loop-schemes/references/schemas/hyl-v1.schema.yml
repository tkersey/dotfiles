actuation_hylomorphism:
  machine_version: HYL-v1
  hyl_id:
  alsr_id:
  seed_type:
  node_type:
  evidence_type:
  verdict_type:
  seed_state:
    artifact_scope:
    frontier_ref:
    memory_refs: []
    review_state:
    proof_state:
    clean_cas_runs:
  coalgebra:
    name:
    input: seed_state
    emits: terminal|blocked|work_node|parallel_frontier
