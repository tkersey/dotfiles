skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: team-patterns
    kind: decision
    source_fingerprint: sha256:replace
  triggers:
    - trigger_id: TRIGGER-OWNER-BOUNDARY
      description: A new validation or state check is proposed outside the canonical owner.
      cue_literals:
        - new validation
        - local guard
        - downstream check
      cue_regexes: []
      exclusions:
        - test-only assertion
  routes:
    - route_id: ROUTE-CANONICAL-OWNER
      description: Reuse or repair the canonical owner.
      aliases:
        - existing-owner
        - owner-boundary
      terminal: "no"
    - route_id: ROUTE-DOWNSTREAM-TOLERANCE
      description: Add downstream tolerance or duplicate validation.
      aliases:
        - local guard
        - fallback
      terminal: "no"
    - route_id: ROUTE-NO-CHANGE
      description: Current behavior already satisfies the pattern.
      aliases:
        - proof-only
      terminal: "yes"
  clauses:
    - clause_id: PATTERN-OWNER-001
      trigger_refs:
        - TRIGGER-OWNER-BOUNDARY
      expected_routes:
        - ROUTE-CANONICAL-OWNER
        - ROUTE-NO-CHANGE
      prohibited_routes:
        - ROUTE-DOWNSTREAM-TOLERANCE
      required_artifacts:
        - owner evidence
        - proof
      success_signals:
        - canonical owner reused
        - duplicate check absent
      failure_signals:
        - new duplicate guard
        - fallback path added
      rationale: The canonical owner should enforce the shared rule once.
  instrumentation:
    decision_receipt: optional
    rationale: Emit only for material route decisions.
