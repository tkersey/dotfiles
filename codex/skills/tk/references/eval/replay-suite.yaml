version: 1
defaults:
  repo: codex
  sandbox: read-only
  case_timeout_seconds: 180
cases:
  - id: replay-origin-boundary-cut
    source: replay
    source_session: ~/.codex/sessions/2026/01/15/rollout-2026-01-15T16-23-01-019bc42f-200f-7270-8cb9-c087d2d035d7.jsonl
    mode: advice
    prompt: |
      Run `$tk` in advice mode only.

      A legacy CLI has `parseEnv()` duplicated in three callers. Each caller trims strings, normalizes booleans differently, and leaves downstream code to re-check for empty values.

      Recommend the incision shape, not a rewrite. The important judgment is where the rule should live and whether crossing into a shared parser module is justified.
    checks:
      - type: ordered_sections
        value:
          - "**Contract**"
          - "**Invariants**"
          - "**Creative Frame**"
          - "**Why This Solution**"
      - type: technique_from_picker
      - type: regex
        value: stable boundary
      - type: regex
        value: parse|normalize|boundary
      - type: regex
        value: cross-module|shared parser|adapter
  - id: replay-total-depravity-doctrine
    source: replay
    source_session: ~/.codex/sessions/2026/02/05/rollout-2026-02-05T06-31-35-019c2e37-3189-77f1-9658-38ab06e441bb.jsonl
    mode: advice
    prompt: |
      Run `$tk` in advice mode.

      A payment pipeline uses `status: string`, returns `-1` for missing retries, mixes raw payloads with validated domain records, and passes `is_prod: bool` through three helpers.

      Recommend the code-shape change that best prevents this bug class.
    checks:
      - type: ordered_sections
        value:
          - "**Contract**"
          - "**Invariants**"
          - "**Creative Frame**"
          - "**Why This Solution**"
      - type: technique_from_picker
      - type: regex
        value: enum|tag|variant
      - type: regex
        value: raw vs validated|validated|parse
      - type: regex
        value: sentinel|in-band
  - id: replay-worker-patch-first
    source: replay
    source_session: ~/.codex/sessions/2026/02/03/rollout-2026-02-03T07-37-59-019c2427-44c9-7cf3-83ec-dd869e570461.jsonl
    mode: strict_output
    prompt: |
      Follow the outer contract exactly.

      Output one fenced `diff` block and nothing else.
      Internally use `$tk` implementation mode.

      File: `src/slug.py`

      ```python
      def slugify(value: str) -> str:
          return value.strip().lower().replace(" ", "-")
      ```

      Need: collapse repeated spaces so `"A   B"` becomes `"a-b"` without adding a caller-side check.
    checks:
      - type: diff_block_count
        value: 1
      - type: not_contains
        value: "**Contract**"
      - type: regex
        value: normalize|slugify
      - type: regex
        value: split|join
  - id: replay-worker-no-diff
    source: replay
    source_session: ~/.codex/sessions/2026/02/05/rollout-2026-02-05T17-58-35-019c30ac-2c8e-7ac1-9a9c-9ef9c28c01f1.jsonl
    mode: strict_output
    prompt: |
      Follow the outer contract exactly.

      Output exactly one line starting with `NO_DIFF:` and nothing else.
      Internally use `$tk` and refuse unsafe movement.

      Task: rename all production user IDs across the repository, but you are only allowed to write `tests/helpers/user_factory.py`.
    checks:
      - type: starts_with
        value: "NO_DIFF:"
      - type: max_nonempty_lines
        value: 1
      - type: not_contains
        value: "```"
  - id: replay-incision-summary-no-raw-diff
    source: replay
    source_session: ~/.codex/sessions/2026/02/02/rollout-2026-02-02T14-33-59-019c207d-c6ce-7c62-9161-2116086f3227.jsonl
    mode: report_only
    prompt: |
      Run `$tk` in implementation-mode reporting only.

      Assume you already made the minimal change for this scenario and cannot paste a raw diff. You also cannot run commands right now, so Proof must give exact commands and what pass would mean.

      Scenario: a request parser currently trims a token in three callers. You moved token normalization into `parse_token(raw)` and updated callers to consume the refined value.

      Return the normal TK chat format, with an Incision section that reads like a high-signal change summary rather than a file inventory.
    checks:
      - type: ordered_sections
        value:
          - "**Contract**"
          - "**Invariants**"
          - "**Creative Frame**"
          - "**Why This Solution**"
          - "**Incision**"
          - "**Proof**"
      - type: technique_from_picker
      - type: regex
        value: parse_token|refined value|normalized
      - type: not_contains
        value: "diff --git"
      - type: not_contains
        value: "@@"
