interface:
  display_name: "seq"
  short_description: "Mine Codex sessions and memories with the Zig seq CLI"
  default_prompt: "Use $seq (Zig CLI) first for explicit `$seq` and artifact-forensics questions across ~/.codex/sessions and ~/.codex/memories. Prefer `seq artifact-search`, then the narrowest specialized follow-up (`skill-blocks` for exact historical `<skill>...</skill>` bodies, `find-session`, `session-prompts`, `session-tooling`, `orchestration-concurrency`, or `query` on `memory_files`), escalate to `query-diagnose` for `seq query` lifecycle debugging, and use generic `query` only when no specialized command fits. Hard gate: run opencode research only when the user request includes literal `opencode`."
