skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: synesthesia
    kind: decision
    source_fingerprint: synesthesia-v3.1.0
  triggers:
  - trigger_id: SYN-EXPLICIT-SENSORY
    description: The user explicitly asks what software feels, sounds, looks, moves, weighs, or resembles.
    cue_literals:
    - feels like
    - sound like
    - look like
    - texture
    - rhythm
    - weight
    - sensory map
    cue_regexes:
    - "(?i)what (does|do) .+ (feel|sound|look) like"
    exclusions: []
  - trigger_id: SYN-COMPARE-FEEL
    description: The user asks to compare alternatives by feel or another stable sensory axis.
    cue_literals:
    - compare by feel
    - which feels
    - smoother
    - lighter
    - quieter
    cue_regexes: []
    exclusions: []
  - trigger_id: SYN-HANDOFF-AMBIGUITY
    description: An owning workflow documents a concrete representational ambiguity that cross-modal recoding may clarify.
    cue_literals:
    - synesthesia handoff
    - representational ambiguity
    cue_regexes: []
    exclusions:
    - generic architecture task with no ambiguity
    - generic performance task with no ambiguity
    - generic readability task with no ambiguity
  - trigger_id: SYN-DURABLE-MEMORY-EVENT
    description: The user explicitly endorses, confirms, corrects, rejects, retracts, reopens, or asks to remember a sensory mapping or boundary.
    cue_literals:
    - remember this mapping
    - save this mapping
    - from now on
    - when I say
    - reject that mapping
    - retract that boundary
    cue_regexes: []
    exclusions:
    - assistant-authored novelty without user authority
  routes:
  - route_id: SYN-ROUTE-DIAGNOSE
    description: Use a reversible sensory representation to generate or rank technical hypotheses.
    aliases:
    - diagnose
    terminal: 'no'
  - route_id: SYN-ROUTE-EXPLAIN
    description: Build a reversible mental model without forcing implementation advice.
    aliases:
    - explain
    - teach
    terminal: 'no'
  - route_id: SYN-ROUTE-COMPARE
    description: Compare alternatives on stable mapping axes and state the decision implication.
    aliases:
    - compare
    terminal: 'no'
  - route_id: SYN-ROUTE-IMPLEMENTATION-LENS
    description: Return one route-shaping insight and hand control back to the implementation owner.
    aliases:
    - implementation-lens
    terminal: 'no'
  - route_id: SYN-ROUTE-MEMORY-ADMISSION
    description: Classify and append one durable Synesthesia source note through memory-source-notes.
    aliases:
    - memory-admission
    terminal: 'no'
  - route_id: SYN-ROUTE-DIRECT-LITERAL
    description: Decline the sensory lens because literal handling or another governing skill is sufficient.
    aliases:
    - direct
    - handoff
    terminal: 'yes'
  - route_id: SYN-ROUTE-BLOCKED
    description: Stop when literal evidence, scope, authority, prior-note relationship, or reversibility is insufficient.
    aliases:
    - blocked
    terminal: 'yes'
  clauses:
  - clause_id: SYN-ACTIVATION-001
    trigger_refs:
    - SYN-EXPLICIT-SENSORY
    - SYN-COMPARE-FEEL
    - SYN-HANDOFF-AMBIGUITY
    expected_routes:
    - SYN-ROUTE-DIAGNOSE
    - SYN-ROUTE-EXPLAIN
    - SYN-ROUTE-COMPARE
    - SYN-ROUTE-IMPLEMENTATION-LENS
    - SYN-ROUTE-DIRECT-LITERAL
    - SYN-ROUTE-BLOCKED
    prohibited_routes:
    - SYN-ROUTE-MEMORY-ADMISSION
    required_artifacts:
    - literal evidence or explicit not-inspected boundary
    - selected mode
    - minimum-sufficient modality rationale
    success_signals:
    - activation is based on representational need or explicit sensory language
    - ordinary domain work remains owned by its technical workflow
    failure_signals:
    - activation solely because the task mentions architecture, performance, readability, flakiness, onboarding, or UX
    - sensory prose with no technical delta
    rationale: Synesthesia is a representational lens, not a broad domain owner.
  - clause_id: SYN-REVERSIBILITY-002
    trigger_refs:
    - SYN-EXPLICIT-SENSORY
    - SYN-COMPARE-FEEL
    - SYN-HANDOFF-AMBIGUITY
    expected_routes:
    - SYN-ROUTE-DIAGNOSE
    - SYN-ROUTE-EXPLAIN
    - SYN-ROUTE-COMPARE
    - SYN-ROUTE-IMPLEMENTATION-LENS
    - SYN-ROUTE-BLOCKED
    prohibited_routes: []
    required_artifacts:
    - evidence
    - engineering translation
    - uncertainty for inferential claims
    - falsifier for material diagnostic claims
    - decision or explanation delta
    success_signals:
    - every material mapping is reversible and falsifiable
    - redundant modalities are omitted
    failure_signals:
    - metaphor treated as evidence
    - several modalities restate the same claim
    - invented runtime facts
    rationale: The lens is useful only when it preserves literal accountability.
  - clause_id: SYN-MEMORY-003
    trigger_refs:
    - SYN-DURABLE-MEMORY-EVENT
    expected_routes:
    - SYN-ROUTE-MEMORY-ADMISSION
    - SYN-ROUTE-BLOCKED
    prohibited_routes:
    - SYN-ROUTE-DIRECT-LITERAL
    required_artifacts:
    - durable authority
    - narrow scope
    - source references
    - canonical sensory payload
    - prior note relationship when changing existing state
    - memory-note proof line
    success_signals:
    - explicit durable authority is persisted in the same turn
    - unendorsed assistant novelty is not persisted
    - confirmation, correction, rejection, retraction, and reopening reference prior notes
    failure_signals:
    - qualifying explicit durable event described but not appended
    - routine diagnostic output appended without authority
    - resource digest promoted without source note IDs
    rationale: Explicit durable user authority should reliably reach the source-note pipeline without weakening admission hygiene.
  instrumentation:
    decision_receipt: optional
    rationale: Routing evals and immutable memory-source notes provide decision and persistence evidence.
