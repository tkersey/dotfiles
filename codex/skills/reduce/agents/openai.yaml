interface:
  display_name: "reduce"
  short_description: "Spot costly abstractions and propose lower-level primitives without flattening real invariants."
  brand_color: "#64748B"
  default_prompt: >
    Review this codebase with $reduce. Identify high-cost abstractions, score tax versus proven value,
    run the essential-abstraction check, and propose a reversible cut list with lower-level replacements,
    proof signals, and rollback. Do not implement unless I explicitly ask.
policy:
  allow_implicit_invocation: true
