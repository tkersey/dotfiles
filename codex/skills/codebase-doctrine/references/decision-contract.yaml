skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: codebase-doctrine
    kind: mixed
    source_fingerprint: codebase-doctrine-v2.0.1

  triggers:
    - trigger_id: CBD-TRIGGER-DOCTRINE
      description: The user wants deep repository understanding plus durable correctness doctrine, knowledge routing, authority/proof maps, or skill recommendations.
      cue_literals:
        - repository correctness doctrine
        - learn this codebase and recommend skills
        - authority map and proof map
        - durable codebase laws
      cue_regexes: []
      exclusions:
        - quick onboarding
        - one isolated invariant
        - ordinary implementation
        - generic review
        - create the skill files now

    - trigger_id: CBD-TRIGGER-SURVEY
      description: The user wants provisional reconnaissance and exact next questions without committed doctrine or portfolio.
      cue_literals:
        - survey the codebase doctrine
        - provisional doctrine map
      cue_regexes: []
      exclusions:
        - complete doctrine

    - trigger_id: CBD-TRIGGER-INTENT-GAP
      description: Repository reconnaissance leaves a material user-owned doctrine choice.
      cue_literals:
        - target boundary
        - current or target doctrine
        - atlas or skills
        - proof bar
        - compatibility posture
      cue_regexes: []
      exclusions:
        - discoverable repository fact
        - low-consequence reversible default

    - trigger_id: CBD-TRIGGER-REFRESH
      description: Existing CBD-v2 must be checked at a new artifact or intent state.
      cue_literals:
        - refresh doctrine
        - doctrine drift
      cue_regexes: []
      exclusions: []

    - trigger_id: CBD-TRIGGER-PORTFOLIO
      description: A valid doctrine exists and only routing or skill candidacy needs reevaluation.
      cue_literals:
        - reevaluate the doctrine skill portfolio
        - portfolio only
      cue_regexes: []
      exclusions: []

    - trigger_id: CBD-TRIGGER-AUDIT
      description: Current guidance or skills must be compared with existing doctrine.
      cue_literals:
        - audit skills against doctrine
        - doctrine conformance audit
      cue_regexes: []
      exclusions: []

  routes:
    - route_id: CBD-ROUTE-GRILL
      description: Mandatory hard-stop route when DIG-v2 has grill_required=yes; pass only CDGH-v2 to grill-me and resume only after a bound plan_allowed closure.
      aliases: [grill-me, intent clarification]
      terminal: "no"

    - route_id: CBD-ROUTE-SURVEY
      description: Emit CBS-v1 with a provisional map and exact next questions.
      aliases: [survey]
      terminal: "yes"

    - route_id: CBD-ROUTE-DOCTRINE
      description: Compile complete CBD-v2 without custom specialists.
      aliases: [doctrine]
      terminal: "yes"

    - route_id: CBD-ROUTE-DEEP
      description: Compile CBD-v2 with adaptive read-only specialists and receipts.
      aliases: [deep]
      terminal: "yes"

    - route_id: CBD-ROUTE-REFRESH
      description: Emit CBDD-v1 and resulting CBD-v2 for a new artifact state.
      aliases: [refresh]
      terminal: "yes"

    - route_id: CBD-ROUTE-PORTFOLIO
      description: Emit CBP-v1 under existing valid doctrine.
      aliases: [portfolio]
      terminal: "yes"

    - route_id: CBD-ROUTE-AUDIT
      description: Emit CBA-v1 comparing current guidance or skills with doctrine.
      aliases: [audit]
      terminal: "yes"

    - route_id: CBD-ROUTE-BLOCKED
      description: Stop because intent, evidence, access, artifact state, or proof is insufficient.
      aliases: [blocked]
      terminal: "yes"

  clauses:
    - clause_id: CBD-ACTIVATION-001
      trigger_refs: [CBD-TRIGGER-DOCTRINE]
      expected_routes:
        - CBD-ROUTE-DOCTRINE
        - CBD-ROUTE-DEEP
        - CBD-ROUTE-GRILL
        - CBD-ROUTE-BLOCKED
      prohibited_routes: []
      required_artifacts: [DIG-v2, CDI-v2 for material doctrine]
      success_signals:
        - compound deep-understanding plus durable-doctrine trigger
        - near-miss onboarding and implementation tasks stay outside
      failure_signals:
        - activated for generic review
        - activated for one isolated invariant
      rationale: Root implicit activation is narrow and compound.

    - clause_id: CBD-INTENT-001
      trigger_refs: [CBD-TRIGGER-DOCTRINE, CBD-TRIGGER-INTENT-GAP]
      expected_routes:
        - CBD-ROUTE-GRILL
        - CBD-ROUTE-DOCTRINE
        - CBD-ROUTE-DEEP
        - CBD-ROUTE-BLOCKED
      prohibited_routes: []
      required_artifacts: [DIG-v2, gate.intent_route, deterministic CDI-v2]
      success_signals:
        - discoverable facts researched before questions
        - every material gap resolved
        - grill_required=yes produces route=grill-me, hard_stop=yes, next_action=activate_grill_me
        - no repository-derived law locked as user intent
      failure_signals:
        - user asked for repository facts
        - soft or advisory grill handoff
        - continued doctrine work while grill_required=yes
        - hand-authored CDI projection drift
      rationale: Intent authorizes inquiry but cannot pre-decide repository laws.

    - clause_id: CBD-GRAPH-001
      trigger_refs: [CBD-TRIGGER-DOCTRINE]
      expected_routes: [CBD-ROUTE-DOCTRINE, CBD-ROUTE-DEEP, CBD-ROUTE-BLOCKED]
      prohibited_routes: []
      required_artifacts:
        - artifact-state pin
        - closed question/evidence/claim graph
        - proof receipts
        - saturation receipt
      success_signals:
        - every typed reference resolves
        - every durable active claim has exactly one primary route
      failure_signals:
        - dangling question or proof reference
        - stale evidence accepted
      rationale: CBD-v2 is a closed artifact-bound graph, not an outline.

    - clause_id: CBD-PORTFOLIO-001
      trigger_refs: [CBD-TRIGGER-DOCTRINE, CBD-TRIGGER-PORTFOLIO]
      expected_routes:
        - CBD-ROUTE-DOCTRINE
        - CBD-ROUTE-DEEP
        - CBD-ROUTE-PORTFOLIO
      prohibited_routes: []
      required_artifacts:
        - knowledge routes
        - evidence-bearing candidacy
      success_signals:
        - zero skills is valid
        - zero or one root and at most five focused candidates
        - initial candidates normally recommended for trial
      failure_signals:
        - mandatory root skill
        - self-attested candidacy
        - directory-shaped portfolio
      rationale: Skills are optional and subordinate to stronger enforcement.

    - clause_id: CBD-MODES-001
      trigger_refs:
        - CBD-TRIGGER-SURVEY
        - CBD-TRIGGER-REFRESH
        - CBD-TRIGGER-PORTFOLIO
        - CBD-TRIGGER-AUDIT
      expected_routes:
        - CBD-ROUTE-SURVEY
        - CBD-ROUTE-REFRESH
        - CBD-ROUTE-PORTFOLIO
        - CBD-ROUTE-AUDIT
        - CBD-ROUTE-BLOCKED
      prohibited_routes: []
      required_artifacts:
        - mode-specific terminal artifact
      success_signals:
        - audit is not aliased to refresh
        - survey does not commit a portfolio
      failure_signals:
        - one monolithic artifact forced on every mode
      rationale: Each lifecycle question has a distinct proof contract.

  instrumentation:
    decision_receipt: required
    rationale: Record activation, mode, intent route, artifact state, portfolio decision, and saturation.
