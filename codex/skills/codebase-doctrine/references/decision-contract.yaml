skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: codebase-doctrine
    kind: mixed
    source_fingerprint: generated-with-dropin-v1
  triggers:
    - trigger_id: CBD-TRIGGER-DOCTRINE
      description: The user wants deep repository understanding plus durable correctness doctrine or skill recommendations.
      cue_literals:
        - learn the codebase and suggest skills
        - repository correctness doctrine
        - authority map and invariants
        - skills for this codebase
      cue_regexes: []
      exclusions:
        - quick architecture summary
        - create the skill files now
    - trigger_id: CBD-TRIGGER-PORTFOLIO
      description: A trustworthy CBD-v1 exists and only knowledge routing or skill candidacy needs reevaluation.
      cue_literals:
        - reevaluate the skill portfolio
        - portfolio only
      cue_regexes: []
      exclusions: []
    - trigger_id: CBD-TRIGGER-REFRESH
      description: Existing doctrine must be checked against a new repository head.
      cue_literals:
        - refresh doctrine
        - doctrine drift
      cue_regexes: []
      exclusions: []
  routes:
    - route_id: CBD-ROUTE-SURVEY
      description: Produce a provisional map and exact next searches.
      aliases:
        - survey
      terminal: "yes"
    - route_id: CBD-ROUTE-DOCTRINE
      description: Run the complete evidence, routing, portfolio, and saturation workflow.
      aliases:
        - doctrine
        - deep
      terminal: "yes"
    - route_id: CBD-ROUTE-PORTFOLIO
      description: Reevaluate knowledge destinations and skill candidacy from existing doctrine.
      aliases:
        - portfolio
      terminal: "yes"
    - route_id: CBD-ROUTE-REFRESH
      description: Refresh existing doctrine at a new artifact state.
      aliases:
        - refresh
        - audit
      terminal: "yes"
    - route_id: CBD-ROUTE-BLOCKED
      description: Stop because evidence or access is insufficient.
      aliases:
        - blocked
      terminal: "yes"
  clauses:
    - clause_id: CBD-SCOPE-001
      trigger_refs:
        - CBD-TRIGGER-DOCTRINE
      expected_routes:
        - CBD-ROUTE-SURVEY
        - CBD-ROUTE-DOCTRINE
        - CBD-ROUTE-BLOCKED
      prohibited_routes: []
      required_artifacts:
        - artifact-state pin
        - evidence ledger
        - saturation verdict
      success_signals:
        - one CBD-v1
        - facts separated from inference
      failure_signals:
        - random file dump
        - outputs merely concatenated from other skills
      rationale: Repository doctrine requires one coherent evidence-backed workflow.
    - clause_id: CBD-ROUTING-001
      trigger_refs:
        - CBD-TRIGGER-DOCTRINE
        - CBD-TRIGGER-PORTFOLIO
      expected_routes:
        - CBD-ROUTE-DOCTRINE
        - CBD-ROUTE-PORTFOLIO
      prohibited_routes: []
      required_artifacts:
        - knowledge-route ledger
        - focused skill candidacy gates
      success_signals:
        - deterministic rules routed before skills
        - one root and at most five focused candidates
      failure_signals:
        - everything becomes a skill
        - directory-tree skill taxonomy
      rationale: Skills are for recurring judgment, not every important rule.
    - clause_id: CBD-SATURATION-001
      trigger_refs:
        - CBD-TRIGGER-DOCTRINE
        - CBD-TRIGGER-REFRESH
      expected_routes:
        - CBD-ROUTE-DOCTRINE
        - CBD-ROUTE-REFRESH
        - CBD-ROUTE-BLOCKED
      prohibited_routes: []
      required_artifacts:
        - lane coverage
        - route-changing open questions
      success_signals:
        - saturated or exact targeted-search decision
      failure_signals:
        - exhaustive understanding claim
        - endless broad search
      rationale: Stop only when more search is unlikely to change doctrine decisions.
  instrumentation:
    decision_receipt: optional
    rationale: CBD-v1 records the material routing and portfolio decisions.
