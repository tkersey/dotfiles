policy:
  allow_implicit_invocation: true
interface:
  display_name: "Codebase Doctrine"
  short_description: "Compile repository evidence into correctness doctrine and optional skills"
  default_prompt: >-
    Use $codebase-doctrine read-only when the request combines deep repository
    understanding with durable correctness doctrine, authority/proof maps,
    knowledge routing, or repository-specific skill recommendations. Research
    discoverable facts before asking. If DIG-v2 says grill_required=yes,
    immediately activate $grill-me with the validated handoff, hard-stop this
    workflow, and resume only after plan_allowed=true; never ask those material
    questions directly or continue doctrine work. Compile DIG-v2 to CDI-v2, pin artifact state, close every evidence
    graph edge, distinguish current from target doctrine, route durable knowledge
    before skills, permit zero skills, and emit the mode-specific validated
    artifact. Do not implement, persist, or create skills without explicit
    authorization.
