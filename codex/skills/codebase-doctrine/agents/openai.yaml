policy:
  allow_implicit_invocation: true
interface:
  display_name: "Codebase Doctrine"
  short_description: "Clarify intent, learn a repository, and design correctness doctrine"
  default_prompt: "Use $codebase-doctrine read-only. Research repository facts first, invoke $grill-me only for material user-owned doctrine choices, lock CDI-v1, then map architecture, authority, laws, failures, proof, knowledge destinations, and the smallest repository-specific skill portfolio."
