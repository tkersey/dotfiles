policy:
  allow_implicit_invocation: false
interface:
  display_name: "Ship"
  short_description: "Publish validated work as a ready PR by default"
  default_prompt: "Use $ship to open, update, or promote a proof-backed PR. For source: actuation, require a current actuating-closure-receipt/v1; preserve the supported source: direct route. Use a draft only with an explicit warrant."
