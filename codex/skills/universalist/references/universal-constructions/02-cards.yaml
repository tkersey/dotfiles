- id: deferred_generation_path
  expert_name: Coyoneda
  public_name: payload with deferred lowering path
  route: UNI-CANONICAL
  priority: 34
  moves:
  - transport
  signals:
  - generated-provenance-loss
  - early-mapping
  requires:
  - payload_and_path
  emits:
  - generated-payload-path-ir
  laws:
  - lowering equals direct interpretation
  - path provenance survives
  falsifiers:
  - two paths with different observable provenance are collapsed
  fallback: payload plus explicit converter
  universal:
    role: transport
    competitors: every compatible path that extends, restricts, lowers, or repackages
      the source behavior
    mediator: one observation-preserving comparison through the selected transport
    canonicality: the comparison is unique up to the declared observations, equations,
      and normalization
    effectivity: construction, comparison, interpretation, and validation fit the
      declared resource model
- id: first_order_behavior_ir
  expert_name: Defunctionalization
  public_name: first-order boundary behavior IR
  route: UNI-ORDINARY
  priority: 20
  moves:
  - generate
  signals:
  - callback-crosses-boundary
  - opaque-function-boundary
  requires:
  - finite_or_effective_cases
  emits:
