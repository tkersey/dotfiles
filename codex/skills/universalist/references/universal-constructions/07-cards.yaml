- id: semantic_obstruction
  expert_name: Obstruction report
  public_name: explicit architectural obstruction
  route: UNI-OBSTRUCT
  moves:
  - obstruct
  signals:
  - witnessed-nonexistence
  - inconsistent-requirements
  - nonrepresentable-specification
  - resource-lower-bound-failure
  - underdetermined-canonical-realization
  requires:
  - obstruction_counterexample
  - reopening_condition
  emits:
  - typed-obstruction
  laws:
  - the missing evidence structure or resource bound is named and reproducible
  falsifiers:
  - the counterexample does not rule out an admissible effective solution
  - the alleged obstruction is only missing or uninspected evidence
  fallback: retain the ordinary candidate or remain blocked until the named reopening condition changes
  universal:
    role: obstruction
    competitors: every claimed exact, canonical, representable, or effective solution
    mediator: the obstruction exhibits the prerequisite or observation each claimed solution violates
    canonicality: the failure is stable under the declared comparison maps rather than an artifact of one implementation
    effectivity: the counterexample or resource lower bound is executable or independently checkable
  selection_mode: selectable
  diagnostic_order: 62
