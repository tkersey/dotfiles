  - semantic-consumer-context
  - raw-context-dump
  requires:
  - task_schema
  - required_observations
  - provenance
  - freshness
  emits:
  - context-certificate-and-rendering
  laws:
  - every required observable is answered missing contradicted or unsupported explicitly
  - rendering preserves required observations
  falsifiers:
  - stale or provenance-free evidence reaches the consumer
  fallback: typed decision packet
  universal:
    role: receiver
    competitors: every admissible producer satisfying the required equations
    mediator: one comparison path from each producer into the selected owner
    canonicality: the comparison is unique up to the declared observations, equations, and normalization
    effectivity: construction, comparison, interpretation, and validation fit the declared resource model
