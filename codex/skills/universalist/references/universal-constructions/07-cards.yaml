- id: canonical_builder_check
  expert_name: Freyd/AFT-style free builder
  public_name: canonical builder or projection obstruction
  route: UNI-CANONICAL
  moves:
  - realize
  - obstruct
  signals:
  - canonical-builder-question
  - projection-may-be-lossy
  requires:
  - observation_projection
  - implementation_constraints
  - bounded_templates
  emits:
  - free-builder-or-obstruction
  laws:
  - projecting the free builder satisfies the requirement
  falsifiers:
  - the projection forgets evidence needed for a canonical builder
  fallback: require explicit implementation obligations
  universal:
    role: realization
    competitors: every implementation-side realization of the required observable behavior
    mediator: the proposed builder maps required behavior into an implementation that projects back correctly
    canonicality: the builder is free/canonical only when the projection preserves the required constraint structure
    effectivity: candidate templates form a bounded effective family; otherwise emit an obstruction
