- id: implementation_realizer
  expert_name: Kan lift
  public_name: implementation realizer behind a fixed projection
  route: UNI-CANONICAL
  moves:
  - realize
  signals:
  - public-behavior-determines-internals
  - lift-shaped-boundary
  requires:
  - required_behavior
  - implementation_world
  - observation_projection
  emits:
  - realizer-and-projection
  laws:
  - projecting the realizer satisfies required behavior
  falsifiers:
  - required behavior cannot be represented behind the projection
  fallback: explicit per-case implementation
  universal:
    role: realization
    competitors: every internal implementation whose projection satisfies the required public behavior
    mediator: one realizer maps each public case into an implementation behind the fixed projection
    canonicality: competing realizers are compared by the declared public observations and implementation obligations
    effectivity: the realization search is constructive, bounded, generated from templates, or returns an obstruction
