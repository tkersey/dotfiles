- id: context_stable_capability
  expert_name: Tambara module
  public_name: context-stable generalized capability
  route: UNI-CANONICAL
  moves:
  - frame
  signals:
  - shared-context-framing
  - repeated-context-wrappers
  requires:
  - ambient_context_world
  - context_tensor_or_action
  - source_action
  - target_action
  - underlying_profunctor
  - frame_operation
  - effective_context_representation
  emits:
  - typed-frame-api
  laws:
  - empty frame is identity
  - nested framing equals combined framing
  - interpretation preserves framing
  falsifiers:
  - framing changes an observation
  - framing widens authority or reorders effects
  fallback: ordinary context parameter
  universal:
    role: framing
    competitors: every legal shared-context frame of the local generalized capability
    mediator: one frame operation transports the capability through each context action
    canonicality: empty framing is identity and nested framing agrees with combined framing up to observation
    effectivity: the context family and residual representation are finite, generated, indexed, or otherwise bounded
