  laws:
  - equivalent residual presentations normalize together
  - interpretation agrees with direct behavior
  falsifiers:
  - residual identity leaks into observations
  - domain optic laws fail
  fallback: explicit getter and updater
  universal:
    role: framing
    competitors: every legal context extension of the local capability
    mediator: one coherent frame path for each supported context
    canonicality: the comparison is unique up to the declared observations, equations,
      and normalization
    effectivity: construction, comparison, interpretation, and validation fit the
      declared resource model
- id: generated_context_closure
  expert_name: Free Tambara construction
  public_name: generated closure under legal contexts
  route: UNI-CANONICAL
  priority: 50
  moves:
  - generate
  - frame
  - normalize
  signals:
  - close-under-all-contexts
  requires:
  - context_basis
  - frame_operation
  - effective_context_representation
  emits:
  - context-closed-capability-ir
  laws:
