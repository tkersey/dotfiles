constructions:
- id: probe_presentation
  expert_name: Codensity / dense-dual presentation
  public_name: probe-based semantic presentation
  route: UNI-CANONICAL
  priority: 42
  moves:
  - observe
  - normalize
  signals:
  - semantic-artifact-too-large
  - probe-determined-semantics
  requires:
  - probe_family
  - reconstruction_assumption
  emits:
  - probe-ir-and-reconstruction
  laws:
  - required observations factor through probes
  - coherent probes reconstruct required semantics
  falsifiers:
  - a required observation is absent from the probes
  fallback: direct semantic interface
  universal:
    role: presentation
    competitors: every semantic artifact satisfying the required observation family
    mediator: one effective representation/reconstruction path
    canonicality: the comparison is unique up to the declared observations, equations,
      and normalization
    effectivity: construction, comparison, interpretation, and validation fit the
      declared resource model
- id: sequential_composition
  expert_name: Category
  public_name: sequential typed composition
  route: UNI-ORDINARY
  priority: 8
  moves:
  - declare
  - compose
  signals:
  - sequential-transformations
  requires:
  - identity_and_composition
  emits:
  - typed-pipeline
  laws:
  - identity and associativity hold
  falsifiers:
  - path grouping changes observations
  fallback: ordinary function composition
  universal:
    role: composition
    competitors: every legal composite and every nearby illegal composition
    mediator: one explicit composition path for each legal composite
    canonicality: the comparison is unique up to the declared observations, equations,
      and normalization
    effectivity: construction, comparison, interpretation, and validation fit the
      declared resource model
