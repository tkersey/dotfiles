constructions:
- id: exact_global_abstraction
  expert_name: Sheafification
  public_name: canonical local-to-global abstraction
  route: UNI-CANONICAL
  priority: 54
  moves:
  - constrain
  - glue
  - normalize
  signals:
  - local-to-global-gluing
  - inexact-abstraction
  requires:
  - usage_site
  - overlap_compatibility
  - global_equivalence
  emits:
  - exact-global-model
  laws:
  - compatible locals glue
  - global glue is unique up to declared equivalence
  - unsupported global states are rejected
  falsifiers:
  - local disagreement
  - missing global case
  - nonunique global representation
  - invisible impossible state
  fallback: refined model plus normalization
  universal:
    role: locality
    competitors: every compatible family of local meanings over the declared usage
      site
    mediator: compatible local sections glue into one global representation
    canonicality: global glue is unique up to the intended quotient or normalization
    effectivity: overlap checks, gluing, and normalization are executable over the
      declared cover or bounded approximation
- id: schema_world
  expert_name: Schema as category / instance as functor
  public_name: typed schema-and-instance boundary
  route: UNI-CANONICAL
  priority: 42
  moves:
  - declare
  signals:
  - typed-schema-mappings
  - data-integration
  requires:
  - source_schema
  - target_schema
  - schema_maps
  emits:
  - typed-schema-instance-model
  laws:
  - instances respect schema equations and references
  falsifiers:
  - data violates a schema equation
  fallback: typed DTO and mapper
  universal:
    role: presentation
    competitors: every semantic artifact satisfying the required observation family
    mediator: one effective representation/reconstruction path
    canonicality: the comparison is unique up to the declared observations, equations,
      and normalization
    effectivity: construction, comparison, interpretation, and validation fit the
      declared resource model
