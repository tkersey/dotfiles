- id: locality_preserving_boundary
  expert_name: Continuous comonadic map
  public_name: locality-preserving boundary
  route: UNI-CANONICAL
  moves:
  - localize
  - transport
  signals:
  - locality-sensitive-boundary
  requires:
  - point_map
  - halo_transport
  - restriction_rules
  - label_policy
  emits:
  - point-map-plus-context-transport
  laws:
  - required neighborhoods and labels are preserved
  falsifiers:
  - point value survives while authority evidence or provenance neighborhood is lost
  fallback: point map plus explicit dependency copy
  universal:
    role: locality
    competitors: every source point together with the neighborhood required by its observations
    mediator: the point map is accompanied by restriction- and label-preserving neighborhood transport
    canonicality: transport agrees with repeated restriction and preserves local/global identity policy
    effectivity: halo transport and invalidation stay within the declared fan-out and freshness budget
