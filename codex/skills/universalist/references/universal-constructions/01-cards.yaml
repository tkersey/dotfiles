- id: canonical_integration
  expert_name: Pushout
  public_name: canonical overlap-aware integration
  route: UNI-CANONICAL
  moves:
  - glue
  - normalize
  signals:
  - explicit-overlap-integration
  - schema-merge
  requires:
  - explicit_overlap
  - source_injections
  - conflict_policy
  emits:
  - integrated-model-or-schema
  laws:
  - source injections agree on overlap
  - non-overlap and provenance survive
  - compatible consumers factor through the integration
  falsifiers:
  - unrelated entities are identified
  - a conflict is silently erased
  fallback: named merge with provenance
  universal:
    role: emitter
    competitors: every pair of sources and downstream consumers agreeing on the declared overlap
    mediator: source injections and one integrated artifact mediate all compatible consumers
    canonicality: only declared overlap is identified; canonical IDs or normalization remove competing merge meanings
    effectivity: conflict detection, provenance retention, and normalization fit the integration budget
  selection_mode: selectable
  diagnostic_order: 15
