  - bounded_approximation
  proof_profile: universal
  theory_refs:
  - structures-and-laws.md
  - canonical-boundary-artifacts.md
- id: exclusive_cases
  expert_name: Coproduct
  public_name: explicit exclusive-state model
  route: UNI-ORDINARY
  moves:
  - glue
  signals:
  - exclusive-cases
  - invalid-state-matrix
  requires:
  - cases_are_exclusive
  emits:
  - tagged-union-or-enum
  laws:
  - elimination is exhaustive
  - invalid mixtures are unrepresentable
  falsifiers:
  - an impossible case combination is accepted
  fallback: validated legacy flags
  universal:
    role: emitter
    competitors: every admissible consumer or interpretation of the generated/integrated artifact
    mediator: one comparison path from the selected artifact into each compatible consumer
    canonicality: the comparison is unique up to the declared observations, equations, and normalization
    effectivity: construction, comparison, interpretation, and validation fit the declared resource model
