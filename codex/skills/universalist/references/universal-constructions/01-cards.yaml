- id: canonical_quotient
  expert_name: Coequalizer / quotient
  public_name: canonical normalized representation
  route: UNI-ORDINARY
  moves:
  - normalize
  signals:
  - redundant-representations
  - equivalent-presentations
  requires:
  - equivalence_relation
  - observable_distinctions_declared
  emits:
  - normal-form-or-canonical-id
  laws:
  - equivalent presentations normalize together
  - normalization respects all sanctioned observations
  falsifiers:
  - two observation-distinct values collide
  fallback: explicit normalization helper
  universal:
    role: emitter
    competitors: every admissible consumer or interpretation of the generated/integrated artifact
    mediator: one comparison path from the selected artifact into each compatible consumer
    canonicality: the comparison is unique up to the declared observations, equations, and normalization
    effectivity: construction, comparison, interpretation, and validation fit the declared resource model
