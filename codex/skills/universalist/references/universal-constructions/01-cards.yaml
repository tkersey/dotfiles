schema: universal-construction-fragment/v6
constructions:
- id: task_local_comparison_universe
  expert_name: Category / task-local world
  public_name: task-local comparison universe
  route: NONE
  selection_mode: support_only
  diagnostic_order: 1
  hole_kinds:
  - object
  - map
  - interpreter
  - composition
  - representation
  - equivalence
  - locality
  - context-action
  - proof
  claim_modes:
  - nomination
  - verification
  guarantees: []
  moves:
  - declare
  signals:
  - comparison-universe
  requires: []
  emits:
  - evidence-bound competitor and comparison policy
  laws:
  - every admissible candidate and comparison map is stated relative to evidence-backed observations, effects, authority,
    and resources
  falsifiers:
  - an unexamined implementation or transformation is silently admitted as a competitor
  fallback: keep the ordinary repository model and state the missing comparison policy
  universal:
    role: support
    competitors: the evidence-backed alternatives admitted for this seam
    mediator: not applicable; this card defines the universe in which mediation is judged
    canonicality: not an implementation artifact
    effectivity: the universe is finite enough to inspect or has an explicit bounded representation
  axes: &id001
  - data-shape
  - syntax-semantics
  - behavior
  - base-composition
  - description-composition
  - context-action
  - locality
  - schema-context
  - transport-realization
  - presentation
  - proof
  claim_scopes:
  - literal
  - effective_realization
  - bounded_approximation
  proof_profile: support
  theory_refs:
  - world-boundary-inventory.md
  - mechanics/foundations.md
- id: effectivity_hypothesis_guard
  expert_name: Existence and effectivity hypotheses
  public_name: construction precondition guard
  route: NONE
  selection_mode: support_only
  diagnostic_order: 2
  hole_kinds:
  - object
  - map
  - interpreter
  - composition
  - representation
  - equivalence
  - locality
  - context-action
  - proof
  claim_modes:
  - nomination
  - verification
  guarantees: []
  moves:
  - obstruct
  signals:
  - effectivity-hypothesis
  requires: []
  emits:
  - explicit hypothesis, approximation, or evidence debt
  laws:
  - no existence or universality claim is upgraded beyond the evidenced hypotheses
  falsifiers:
  - a formal construction is treated as executable without a representation and resource bound
  fallback: downgrade to an ordinary or bounded construction
  universal:
    role: support
    competitors: candidate constructions whose existence or execution depends on additional hypotheses
    mediator: not applicable; this card guards theorem use
    canonicality: not an implementation artifact
    effectivity: every guarded hypothesis is evidenced, assumed explicitly, approximated, or left blocking
  axes: *id001
  claim_scopes:
  - literal
  - effective_realization
  - bounded_approximation
  proof_profile: support
  theory_refs:
  - effective-categorical-normal-form.md
  - effective-computational-substrate.md
  - sources.md
- id: joint_aggregate
  expert_name: Product
  public_name: joint data aggregate
  route: UNI-ORDINARY
  moves:
  - constrain
  signals:
  - independent-data
  requires:
  - independent_components
  emits:
  - record-or-struct
  laws:
  - each projection recovers its component
  - construction and projection round-trip
  falsifiers:
  - a component cannot be recovered
  fallback: plain record
  universal:
    role: receiver
    competitors: every admissible producer satisfying the required equations
    mediator: one comparison path from each producer into the selected owner
    canonicality: the comparison is unique up to the declared observations, equations, and normalization
    effectivity: construction, comparison, interpretation, and validation fit the declared resource model
  selection_mode: selectable
  diagnostic_order: 10
