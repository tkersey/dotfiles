skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: universalist
    kind: mixed
    source_fingerprint: universalist-boundary-decision-v11
  triggers:
    - trigger_id: UNI-BOUNDARY
      description: Implementation or resolution considers how values effects state evidence authority or behavior cross an owned code boundary.
      cue_literals: [code boundary, boundary disposition, source / target, preserved / forgotten / generated / observed, law, falsifier]
      cue_regexes: []
      exclusions: [work wholly internal to one unchanged boundary, category theory exposition without a concrete seam]
    - trigger_id: UNI-CONSEQUENTIAL
      description: At least two plausible routes materially differ in persistent behavior authority compatibility migration enforcement invalidation or proof obligations.
      cue_literals: [smallest honest construction, ordinary candidate, relevant construction cards, material architectural delta, obstruction report, advanced mechanics]
      cue_regexes: []
      exclusions: [routine seam with one plausible route, ceremonial activation with no route choice, static schema example, categorical label with no material delta]
  routes:
    - route_id: UNI-PRESERVE
      description: Preserve an already exact boundary and continue without a new abstraction.
      aliases: []
      terminal: "yes"
    - route_id: UNI-ORDINARY
      description: Apply the smallest ordinary repository-native construction that makes the seam exact.
      aliases: []
      terminal: "no"
    - route_id: UNI-CANONICAL
      description: Apply a construction card or advanced mechanics route because it materially strengthens the ordinary candidate.
      aliases: []
      terminal: "no"
    - route_id: UNI-OBSTRUCT
      description: Stop with an obstruction or explicitly justify a primitive bypass when no honest representable or effective construction is available.
      aliases: []
      terminal: "yes"
  clauses:
    - clause_id: UNI-DISPOSITION-001
      trigger_refs: [UNI-BOUNDARY]
      expected_routes: [UNI-PRESERVE, UNI-ORDINARY, UNI-CANONICAL, UNI-OBSTRUCT]
      prohibited_routes: []
      required_artifacts: [boundary disposition with attributed rationale and owner, source and target worlds, preserved forgotten generated and observed information, compatibility plan, law, falsifier]
      success_signals: [the owning seam and observable law are explicit, preservation is representable without inventing structure, ordinary routing follows the declared disposition]
      failure_signals: [boundary disposition without attributed rationale, boundary language without an owner, compatibility or falsifier omitted, symptom-only downstream patch, a newly introduced ordinary boundary mislabeled as preserve]
      rationale: Broad activation is useful only when every considered boundary receives an explicit disposition and executable falsifier.
    - clause_id: UNI-MINIMAL-001
      trigger_refs: [UNI-CONSEQUENTIAL]
      expected_routes: [UNI-PRESERVE, UNI-ORDINARY, UNI-CANONICAL, UNI-OBSTRUCT]
      prohibited_routes: []
      required_artifacts: [ordinary candidate, relevant construction cards and dispositions, selected construction, alternatives considered, rejected route, material architectural delta, expected outcome, resource impact]
      success_signals: [one signal one seam one smallest honest construction, every relevant card is selected rejected contradicted or unresolved, rejected alternatives are decision relevant]
      failure_signals: [relevant card ignored, signal count evidence count diagnostic order or registry order manufactures a winner, categorical label without a code or test delta, widened seam without a law requirement]
      rationale: The decision record must expose what changed because of Universalist rather than merely proving that the skill was present.
    - clause_id: UNI-MECHANICS-001
      trigger_refs: [UNI-CONSEQUENTIAL]
      expected_routes: [UNI-PRESERVE, UNI-ORDINARY, UNI-CANONICAL, UNI-OBSTRUCT]
      prohibited_routes: []
      required_artifacts: [advanced mechanics disposition, concrete artifact or none, interpreter projection handler lowering context transport locality representation description composition context framing or two-dimensional square calculus when mechanics are used, existence or nonexistence evidence, commutation or preservation evidence, competitor mediation evidence, canonicality or uniqueness-up-to evidence, effective presentation evidence, mechanics falsifier]
      success_signals: [none is explicit for ordinary seams, a named mechanics topic changes the artifact and proof when selected, theorem cards link to retained doctrine and mechanics sources, double-category selection names both arrow families square pasting interchange and one effective interpretation]
      failure_signals: [decorative Kan Yoneda Coyoneda Freyd operad pullback pushout double-category equipment comonad density halo Day promonoidal Tambara optic codensity CQL or sheafification vocabulary, mechanics selected without evidenced preconditions, mechanics selected without a complete proof profile, static contextual or interchange structure used to imply effect commutativity, commutative square mislabeled as a double category]
      rationale: Deep mechanics remain available in the theorem library but are retained only when a relevant card produces a material delta and complete proof obligations.
    - clause_id: UNI-DOUBLE-001
      trigger_refs: [UNI-CONSEQUENTIAL]
      expected_routes: [UNI-ORDINARY, UNI-CANONICAL, UNI-OBSTRUCT]
      prohibited_routes: []
      required_artifacts: [horizontal arrow family and composition, vertical arrow family and composition, typed square representation, horizontal square pasting, vertical square pasting, interchange or coherent comparison, double-functor interpretation, effect and resource guardrail, mismatch and interchange falsifiers]
      success_signals: [the two arrow families have distinct repository meanings, local compatibility squares paste into one global witness, the two pasting orders agree under the declared observations]
      failure_signals: [one arrow family does not compose, square boundaries are unchecked, interchange changes a required observation, a smaller category 2-category adapter or DPO artifact already suffices, equipment claimed without companions conjoints or restrictions]
      rationale: Double categories add value only when composition of behavior and composition of change are both architecture and their compatibility is compositional.
    - clause_id: UNI-OBSTRUCTION-001
      trigger_refs: [UNI-CONSEQUENTIAL]
      expected_routes: [UNI-OBSTRUCT]
      prohibited_routes: [UNI-PRESERVE]
      required_artifacts: [witnessed nonexistence inconsistency nonrepresentability resource lower bound or canonical underdetermination, counterexample, obstruction stability, effective obstruction check, falsifier, reopening condition, resolution of every active constructive alternative]
      success_signals: [missing evidence remains epistemic debt, a complete obstruction is selected only when no constructive alternative remains active]
      failure_signals: [failed implementation attempt treated as nonexistence, missing evidence treated as obstruction, obstruction loses to a constructive card by diagnostic priority, constructive and obstruction evidence coexist without explicit conflict]
      rationale: Obstruction is a proved architectural result rather than a fallback label for uncertainty or implementation failure.
    - clause_id: UNI-ROOT-001
      trigger_refs: [UNI-CONSEQUENTIAL]
      expected_routes: [UNI-PRESERVE, UNI-ORDINARY, UNI-CANONICAL, UNI-OBSTRUCT]
      prohibited_routes: []
      required_artifacts: [one ledger-addressed Universalist plan, one root SDR-v1 receipt, plan-bound artifact state, worker references to the root decision id]
      success_signals: [exactly one root receipt per consequential changed seam, independent axis analysis shares the root seam decision unless it becomes a genuinely distinct changed seam]
      failure_signals: [duplicate worker receipts, one receipt spans unrelated seams, receipt emitted from a static example]
      rationale: Root-scoped receipts preserve attribution without multiplying one architectural decision across collaborators.
  instrumentation:
    decision_receipt: required
    rationale: Consequential boundary-route choices need one plan-bound receipt so Seq can separate activation from decision influence.
