invariants:
  - name: one_signal_one_seam
    required: ["Signal", "Construction", "Seam / files", "Verification"]
  - name: boundary_trigger_requires_disposition
    when: "implementation or resolution considers a code boundary"
    required: ["Boundary and compatibility plan", "Boundary", "Disposition", "Owner", "Source / target", "Law", "Falsifier"]
  - name: consequential_route_requires_one_root_receipt
    when: "Universalist selects or preserves a route by rejecting a nearby alternative for a changed seam"
    required: ["ledger-addressed plan", "decision id", "selected route", "rejected route", "advanced mechanics disposition", "law", "falsifier", "one root SDR-v1 receipt"]
  - name: track_d_requires_artifact
    when: "Track D"
    required: ["Canonical boundary artifact", "Law / proof signal", "Falsifier"]
  - name: track_i_requires_effective_substrate
    when: "Track I"
    required: ["Effective substrate", "Concrete Primitive Register", "Resource model", "Effective Universal Architecture Certificate", "Witness seam"]
  - name: subagents_require_explicit_request
    when: "team mode"
    required: ["explicit request", "root synthesis", "one writer", "independent verifier"]
  - name: composition_geometry_requires_law
    when: "operad or Freyd category"
    required: ["Composition geometry", "Semantic interpretation", "Law witness", "Falsifier"]
  - name: pullback_requires_agreement_and_factorization
    when: "pullback"
    required: ["Shared target", "Agreement equation", "Canonical witness", "Factorization", "Mismatch falsifier"]
  - name: pushout_requires_overlap_and_factorization
    when: "pushout"
    required: ["Explicit overlap", "Source injections", "Conflict policy", "Provenance", "Factorization", "False-merge falsifier"]
  - name: double_pushout_requires_complement_check
    when: "double pushout or graph rewrite"
    required: ["Preserved interface", "Pushout complement", "Dangling/identification conditions", "Obstruction report", "Rewrite trace"]
  - name: comonadic_spatiality_requires_locality_laws
    when: "comonadic spatiality or comonad as space"
    required: ["Points", "Local patches", "Center/counit law", "Neighborhood coherence", "Effective halo", "Restriction/germ law", "Labelled-halo fields", "Continuity law", "Resource law", "Locality falsifier"]
  - name: density_basis_requires_reconstruction
    when: "density comonad or basis"
    required: ["Patch vocabulary/subbasis", "Local points", "Global points", "Local-to-global map", "Basis or explicit non-basis", "Canonical reconstruction", "Basis-density witness", "Obstruction"]
  - name: continuous_spatial_boundary_requires_halo_preservation
    when: "continuous comonadic map or locality-preserving boundary"
    required: ["Point map", "Halo-map direction", "Coalgebra/context transport", "Labels preserved/translated/forgotten", "Restriction law", "Continuity law", "Continuity falsifier"]
  - name: spatial_context_requires_germ_and_budget
    when: "Context(q) is modeled as a germ"
    required: ["Task point", "Effective halo", "Local/global identity", "Restriction rules", "Provenance", "Freshness", "Halo budget", "Rendering continuity"]