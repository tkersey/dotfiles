cases:
  - prompt: "Refactor this status/boolean matrix so invalid states are impossible."
    should_use_skill: true
    expected: ["coproduct", "one seam", "invalid fixture"]
  - prompt: "Our generated artifacts lose provenance and old views disagree."
    should_use_skill: true
    expected: ["canonical boundary artifact", "generation path", "coherent observations"]
  - prompt: "Implement an unrelated endpoint with no structural smell."
    should_use_skill: false
  - prompt: "Design and implement this whole system on a computationally universal categorical substrate."
    should_use_skill: true
    expected: ["Track I", "effective substrate", "concrete primitives", "resource model", "witness seam"]
  - prompt: "Use $universalist in categorical-substrate team mode; spawn custom agents and synthesize the architecture."
    should_use_skill: true
    should_spawn_subagents: true
    expected: ["specialist packets", "Effective Universal Architecture Certificate", "one writer", "verifier"]
  - prompt: "Use $universalist for this small one-seam type refactor."
    should_use_skill: true
    should_spawn_subagents: false
    expected: ["one seam", "smallest honest construction"]

