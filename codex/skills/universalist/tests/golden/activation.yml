cases:
  - prompt: "Refactor this status/boolean matrix so invalid states are impossible."
    should_use_skill: true
    expected: ["coproduct", "one seam", "invalid fixture"]
  - prompt: "Our generated artifacts lose provenance and old views disagree."
    should_use_skill: true
    expected: ["canonical boundary artifact", "generation path", "coherent observations"]
  - prompt: "Implement an unrelated endpoint with no structural smell."
    should_use_skill: true
    expected: ["Boundary-trigger mandate", "public API", "boundary disposition", "compatibility"]
  - prompt: "Implement the DTO-to-domain adapter for this endpoint while keeping its JSON wire shape stable."
    should_use_skill: true
    expected: ["implementation", "serializer/codec boundary", "preserved", "law", "falsifier"]
  - prompt: "Resolve this PR finding: the serializer drops provenance when internal records cross into the wire format."
    should_use_skill: true
    expected: ["resolution", "boundary liability", "owner boundary", "projection law", "boundary disposition"]
  - prompt: "Resolve the failing CLI test where parsed flags no longer reach the execution configuration."
    should_use_skill: true
    expected: ["resolution", "parser boundary", "source / target", "law", "falsifier"]
  - prompt: "Run $resolve on this PR; the accepted review repair changes the serializer boundary."
    should_use_skill: true
    expected: ["resolution", "owner boundary", "boundary disposition", "law", "falsifier"]
  - prompt: "Add caching behind the repository interface without changing its observable contract."
    should_use_skill: true
    expected: ["preserved boundary", "owner", "observations", "compatibility"]
  - prompt: "Rename a local variable inside a private helper without changing its inputs, outputs, effects, or ownership."
    should_use_skill: false
  - prompt: "Design and implement this whole system on a computationally universal categorical substrate."
    should_use_skill: true
    expected: ["Track I", "effective substrate", "concrete primitives", "resource model", "witness seam"]
  - prompt: "Use $universalist in categorical-substrate team mode; spawn custom agents and synthesize the architecture."
    should_use_skill: true
    should_spawn_subagents: true
    expected: ["specialist packets", "Effective Universal Architecture Certificate", "one writer", "verifier"]
  - prompt: "Use $universalist for this small one-seam type refactor."
    should_use_skill: true
    should_spawn_subagents: false
    expected: ["one seam", "smallest honest construction"]
  - prompt: "Our typed service components are wired through arbitrary call graphs; make the legal hierarchical assembly explicit."
    should_use_skill: true
    expected: ["Track D", "colored operad", "ports", "substitution law", "forbidden wiring"]
  - prompt: "Pure planning code and effectful tool calls are mixed, and someone wants to parallelize them."
    should_use_skill: true
    expected: ["Freyd category", "premonoidal", "evaluation order", "central operations", "noncommuting witness"]
  - prompt: "Construct an authorization context only when the request tenant and principal tenant agree."
    should_use_skill: true
    expected: ["pullback", "shared projection", "mismatch rejected", "factorization"]
  - prompt: "Merge these two schemas along their explicit shared core while preserving provenance and surfacing conflicts."
    should_use_skill: true
    expected: ["pushout", "overlap", "provenance", "conflict policy", "factorization"]
  - prompt: "Rewrite this typed architecture graph by deleting one pattern, preserving its interface, and adding a replacement."
    should_use_skill: true
    expected: ["double pushout", "pushout complement", "preserved interface", "obstruction"]
  - prompt: "Before editing this symbol, compute its dependency, ownership, test, and provenance neighborhood and preserve that locality through the refactor."
    should_use_skill: true
    expected: ["comonadic spatiality", "halo", "labelled", "continuity law", "resource budget"]
  - prompt: "These local patches cover our examples; determine whether they form a basis that canonically reconstructs every situated object."
    should_use_skill: true
    expected: ["density comonad", "subbasis", "basis", "canonical reconstruction", "obstruction"]
  - prompt: "The new API preserves entity IDs but loses scope and capability context."
    should_use_skill: true
    expected: ["continuous map", "point map", "halo preservation", "locality falsifier"]
  - prompt: "Treat this nearby-files list as a comonad even though there is no extract, duplicate, restriction, or locality law."
    should_use_skill: true
    expected: ["reject", "plain dependency graph", "no comonad claim", "falsifier"]