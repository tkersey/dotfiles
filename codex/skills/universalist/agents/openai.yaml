interface:
  display_name: "Universalist"
  short_description: "Apply Universalist at every code boundary."
  brand_color: "#6D5EF6"
  default_prompt: "Use $universalist to inspect the code boundary this implementation or resolution creates, changes, preserves, repairs, or removes. Produce the smallest boring repository-native candidate first, run the categorical corpus as a hidden universal shadow, keep it only when it creates a material architectural delta, and emit plain engineering artifacts, laws, falsifiers, or an obstruction. Expose categorical names only when explicitly requested."
policy:
  allow_implicit_invocation: true
