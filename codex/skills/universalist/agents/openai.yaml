interface:
  display_name: "universalist"
  short_description: "Find the smallest honest construction that simplifies the shape of truth."
  brand_color: "#7C3AED"
  default_prompt: >
    Review this codebase with $universalist. Identify structural signals, choose at most one seam,
    run a reduction preflight, propose the smallest honest construction, preserve boundaries with
    adapters when needed, and name the fastest proof signal. Do not implement unless I explicitly ask.
policy:
  allow_implicit_invocation: true
