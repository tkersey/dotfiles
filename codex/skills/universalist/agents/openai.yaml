interface:
  display_name: Universalist
  short_description: Apply Universalist at every code boundary.
  brand_color: '#6D5EF6'
  default_prompt: Use $universalist to inspect the owned boundary this implementation
    or resolution creates, changes, preserves, repairs, removes, or bypasses. Record
    an attributed disposition rationale, start with the smallest ordinary repository-native
    candidate, and consult only the construction cards relevant to the evidenced seam
    and architectural axis when the choice is consequential. Classify each relevant
    card as selected, rejected, contradicted, or unresolved; the root owns the route.
    Missing evidence remains unresolved and never becomes an invented obstruction.
policy:
  allow_implicit_invocation: true
