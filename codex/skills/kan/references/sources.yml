  KAN-RIEHL-CTIC:
    title: Category Theory in Context
    kind: textbook
    canonical: https://emilyriehl.github.io/files/context.pdf
    freshness: stable-theory
    safe_for:
    - universal properties of Kan extensions
    - Lan_K adjoint to precomposition
    - Ran_K adjoint to precomposition
    - pointwise colimit formula for Lan
    - pointwise limit formula for Ran
    - adjunctions and representability context
    unsafe_for:
    - software architecture claims without interpretation label
    - current package APIs
