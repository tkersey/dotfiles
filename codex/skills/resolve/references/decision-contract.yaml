skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: resolve
    kind: workflow
    source_fingerprint: resolve-v8-intent-closed-cegis
  triggers:
    - trigger_id: RESOLVE-DISCOVER
      description: A material review campaign needs initial sensing and intent closure.
      cue_literals:
        - $resolve
        - material review
        - review campaign
      cue_regexes: []
      exclusions:
        - one-shot review only
    - trigger_id: RESOLVE-CEX
      description: A review claim must be admitted, rejected, or routed outside the horizon.
      cue_literals:
        - review finding
        - CAS finding
        - PR comment
        - counterexample
      cue_regexes: []
      exclusions: []
    - trigger_id: RESOLVE-RECURRENCE
      description: A counterexample class recurs or a novel class appears after realization.
      cue_literals:
        - same class recurs
        - new equivalence class
        - adjacent finding
      cue_regexes: []
      exclusions: []
    - trigger_id: RESOLVE-CLOSE
      description: Targeted conformance and terminal holdout may permit closure.
      cue_literals:
        - close resolve
        - terminal holdout
        - certify terminal
      cue_regexes: []
      exclusions:
        - merge
        - land
  routes:
    - route_id: RESOLVE-SEAL-INTENT
      description: Compile and seal AC-v2.
      aliases: [seal-intent]
      terminal: "no"
    - route_id: RESOLVE-ADMIT-CEX
      description: Admit a novel in-horizon counterexample to the basis.
      aliases: [enter-kernel]
      terminal: "no"
    - route_id: RESOLVE-ATTACH-WITNESS
      description: Attach proof/witness to an existing class without new semantics.
      aliases: [proof-only]
      terminal: "no"
    - route_id: RESOLVE-INVALIDATE-REALIZATION
      description: Invalidate the realization on same-class recurrence/nonconformance.
      aliases: [return-to-realization]
      terminal: "no"
    - route_id: RESOLVE-RETURN-KERNEL
      description: Recompile CEB/MBK/RC for a novel in-horizon class.
      aliases: [return-to-kernel]
      terminal: "no"
    - route_id: RESOLVE-RETURN-CONTRACT
      description: Rebase or reject a scope-expanding/contract-invalidating claim.
      aliases: [return-to-contract]
      terminal: "no"
    - route_id: RESOLVE-FOLLOWUP
      description: Capture an outside-horizon issue without current mutation.
      aliases: [defer-followup]
      terminal: "yes"
    - route_id: RESOLVE-REJECT
      description: Reject refuted, stale, duplicate, preference, or unrelated claim.
      aliases: [reject]
      terminal: "yes"
    - route_id: RESOLVE-REALIZE
      description: Realize one accepted kernel design.
      aliases: [realize]
      terminal: "no"
    - route_id: RESOLVE-CLOSE
      description: Tuple or terminal close under current controller receipts.
      aliases: [close]
      terminal: "yes"
    - route_id: RESOLVE-BLOCK
      description: Stop because intent, batch, kernel, potential, proof, or delivery gate failed.
      aliases: [blocked]
      terminal: "yes"
  clauses:
    - clause_id: RESOLVE-INTENT-001
      trigger_refs: [RESOLVE-DISCOVER]
      expected_routes: [RESOLVE-SEAL-INTENT, RESOLVE-BLOCK]
      prohibited_routes: [RESOLVE-REALIZE, RESOLVE-CLOSE]
      required_artifacts: [AC-v2, immutable horizon fingerprint]
      success_signals:
        - required, forbidden, compatibility, MAY, and OUTSIDE behavior separated
      failure_signals:
        - raw plan reread becomes silent scope expansion
      rationale: The accepted observation language must close before synthesis.
    - clause_id: RESOLVE-BATCH-001
      trigger_refs: [RESOLVE-CEX, RESOLVE-RECURRENCE]
      expected_routes:
        - RESOLVE-ADMIT-CEX
        - RESOLVE-ATTACH-WITNESS
        - RESOLVE-INVALIDATE-REALIZATION
        - RESOLVE-RETURN-KERNEL
        - RESOLVE-RETURN-CONTRACT
        - RESOLVE-FOLLOWUP
        - RESOLVE-REJECT
        - RESOLVE-BLOCK
      prohibited_routes: [RESOLVE-REALIZE]
      required_artifacts: [sealed RB-v1, validated CEX-v1 records]
      success_signals:
        - mutation zero while batch open
      failure_signals:
        - one finding one patch
      rationale: Review evidence must be collected and classified before mutation.
    - clause_id: RESOLVE-NOVELTY-001
      trigger_refs: [RESOLVE-CEX, RESOLVE-RECURRENCE]
      expected_routes:
        - RESOLVE-ADMIT-CEX
        - RESOLVE-ATTACH-WITNESS
        - RESOLVE-INVALIDATE-REALIZATION
        - RESOLVE-RETURN-KERNEL
        - RESOLVE-RETURN-CONTRACT
        - RESOLVE-FOLLOWUP
        - RESOLVE-REJECT
      prohibited_routes: []
      required_artifacts: [CEX novelty, existing class ref when applicable]
      success_signals:
        - additional witness creates no new implementation distinction
      failure_signals:
        - duplicate witness creates branch/helper/test family
      rationale: Novel classes, not raw finding count, govern kernel growth.
    - clause_id: RESOLVE-PHI-001
      trigger_refs: [RESOLVE-RECURRENCE, RESOLVE-CLOSE]
      expected_routes:
        - RESOLVE-INVALIDATE-REALIZATION
        - RESOLVE-RETURN-KERNEL
        - RESOLVE-REALIZE
        - RESOLVE-CLOSE
        - RESOLVE-BLOCK
      prohibited_routes: []
      required_artifacts: [PHI-v1]
      success_signals:
        - strict primary decrease and nonincreasing hard surface/proof debt
      failure_signals:
        - comment silence without semantic progress
      rationale: Every cycle must reduce the unresolved review problem.
    - clause_id: RESOLVE-CONFORMANCE-001
      trigger_refs: [RESOLVE-RECURRENCE, RESOLVE-CLOSE]
      expected_routes:
        - RESOLVE-ATTACH-WITNESS
        - RESOLVE-INVALIDATE-REALIZATION
        - RESOLVE-RETURN-KERNEL
        - RESOLVE-RETURN-CONTRACT
        - RESOLVE-FOLLOWUP
        - RESOLVE-CLOSE
        - RESOLVE-BLOCK
      prohibited_routes: [RESOLVE-ADMIT-CEX]
      required_artifacts: [targeted RAP-v1, sealed conformance RB-v1]
      success_signals:
        - generic whole-diff review absent during conformance
      failure_signals:
        - post-kernel broad review directly creates patch
      rationale: Implementation review is targeted falsification of accepted laws.
    - clause_id: RESOLVE-CLOSE-001
      trigger_refs: [RESOLVE-CLOSE]
      expected_routes: [RESOLVE-CLOSE, RESOLVE-BLOCK]
      prohibited_routes: []
      required_artifacts:
        - current AC/CEB/MBK/RC/design/PHI
        - sealed terminal holdout
        - current proof/thread/delivery receipts
      success_signals:
        - zero novel in-horizon counterexamples
      failure_signals:
        - open batch or stale horizon
      rationale: Closure is tuple- and horizon-bound.
  instrumentation:
    decision_receipt: required
    rationale: Controller transitions project into SDR-v1.
