policy:
  allow_implicit_invocation: true
interface:
  display_name: "Resolve"
  short_description: "Intent-closed counterexample synthesis and closure"
  default_prompt: >-
    Use $resolve as an intent-closed counterexample synthesis compiler. Seal
    AC-v2, run bounded review batches, admit only minimal in-horizon CEX-v1,
    quotient them into one MBK/RC, realize one design, require strict PHI-v1
    progress, run targeted conformance plus one terminal holdout, and close only
    against current controller, proof, PR, and delivery receipts.
