policy:
  allow_implicit_invocation: false
interface:
  display_name: "Fixed-Point Driver"
  short_description: "Realize one fenced workspace action"
  default_prompt: >-
    Use $fixed-point-driver only with an explicit plan, GCR-v2, held claim,
    current fencing token, branch epoch, isolated worktree, and resource
    boundary. Realize one selected action, run focused proof, emit FPSR-v2 and a
    change-set handoff, and stop on new observations or resource expansion.
