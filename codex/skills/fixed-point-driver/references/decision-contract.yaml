skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: fixed-point-driver
    kind: mixed
    source_fingerprint: fpd-v8-workspace-fenced
  triggers:
    - trigger_id: FPD-SLICE
      description: A valid FPS-v2 selects one bounded realization.
      cue_literals: [FPS-v2, fixed_point_slice]
      cue_regexes: []
      exclusions: []
    - trigger_id: FPD-OBSERVATION
      description: Realization discovers a new semantic or resource requirement.
      cue_literals: [new observation, resource expansion, new owner]
      cue_regexes: []
      exclusions: []
  routes:
    - route_id: FPD-VALID
      description: Emit valid bounded result.
      aliases: [valid]
      terminal: "yes"
    - route_id: FPD-NO-CHANGE
      description: Prove no mutation is needed.
      aliases: [no-change]
      terminal: "yes"
    - route_id: FPD-RETURN-FRONTIER
      description: Return on semantic novelty.
      aliases: [return-to-frontier]
      terminal: "yes"
    - route_id: FPD-RETURN-WORKSPACE
      description: Return on claim/resource/epoch change.
      aliases: [return-to-workspace]
      terminal: "yes"
    - route_id: FPD-BLOCK
      description: Stop on invalid authority or proof.
      aliases: [blocked]
      terminal: "yes"
  clauses:
    - clause_id: FPD-FENCE-001
      trigger_refs: [FPD-SLICE]
      expected_routes:
        - FPD-VALID
        - FPD-NO-CHANGE
        - FPD-RETURN-FRONTIER
        - FPD-RETURN-WORKSPACE
        - FPD-BLOCK
      prohibited_routes: []
      required_artifacts:
        - current GCR-v2
        - claim and fencing
        - external worktree
      success_signals:
        - zero uncovered changed paths
      failure_signals:
        - primary checkout mutation
      rationale: Realization authority is claim scoped.
    - clause_id: FPD-EXPAND-001
      trigger_refs: [FPD-OBSERVATION]
      expected_routes: [FPD-RETURN-FRONTIER, FPD-RETURN-WORKSPACE, FPD-BLOCK]
      prohibited_routes: [FPD-VALID]
      required_artifacts:
        - new observation or requested resources
      success_signals:
        - mutation stops before expansion
      failure_signals:
        - adjacent edit performed
      rationale: The driver cannot redefine semantic or coordination authority.
  instrumentation:
    decision_receipt: optional
    rationale: FPSR-v2 carries the realization outcome.
