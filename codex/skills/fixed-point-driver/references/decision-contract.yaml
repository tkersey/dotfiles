skill_decision_contract:
  contract_version: SKDC-v1
  skill:
    name: fixed-point-driver
    kind: implementation
    source_fingerprint: fixed-point-driver-v7-policy-aware
  triggers:
    - trigger_id: FPD-POLICY-SLICE
      description: A policy-bound FPS-v1 selects one bounded realization action.
      cue_literals:
        - execution_policy_graph
        - policy_control
        - FPS-v1
      cue_regexes: []
      exclusions: []
    - trigger_id: FPD-LEGACY-SLICE
      description: A legacy ASL/FPS selected route requires realization.
      cue_literals:
        - fixed_point_slice
        - actuation_slice_ref
      cue_regexes: []
      exclusions: []
    - trigger_id: FPD-KERNEL
      description: A certified kernel/RC-v1 requires realization.
      cue_literals:
        - kernel_realization_handoff
        - RC-v1
      cue_regexes: []
      exclusions: []
    - trigger_id: FPD-NEW-EVIDENCE
      description: Realization discovers a new class, branch, owner, boundary, or proof obligation.
      cue_literals:
        - new observation
        - prediction invalidated
        - boundary expansion
      cue_regexes: []
      exclusions: []
  routes:
    - route_id: FPD-REALIZE
      description: Realize the selected route/action inside the certified boundary.
      aliases: [valid]
      terminal: "yes"
    - route_id: FPD-NO-CHANGE
      description: Prove the selected obligation already holds without mutation.
      aliases: [no_change]
      terminal: "yes"
    - route_id: FPD-RETURN
      description: Stop and return new evidence to the owning controller.
      aliases: [return_to_frontier]
      terminal: "yes"
    - route_id: FPD-BLOCK
      description: Stop on environment/dependency/authority blocker.
      aliases: [blocked]
      terminal: "yes"
    - route_id: FPD-INVALID
      description: Reject scope, budget, identity, orphan, or proof violation.
      aliases: [invalid]
      terminal: "yes"
  clauses:
    - clause_id: FPD-INPUT-001
      trigger_refs: [FPD-POLICY-SLICE, FPD-LEGACY-SLICE, FPD-KERNEL]
      expected_routes:
        - FPD-REALIZE
        - FPD-NO-CHANGE
        - FPD-RETURN
        - FPD-BLOCK
        - FPD-INVALID
      prohibited_routes: []
      required_artifacts:
        - accepted bounded handoff
        - owner, boundary, budget, and proof
      success_signals:
        - no mutation before gate validation
      failure_signals:
        - prose-only route
        - driver invents policy/quotient/normal form
      rationale: Selection authority remains upstream.
    - clause_id: FPD-POLICY-001
      trigger_refs: [FPD-POLICY-SLICE]
      expected_routes:
        - FPD-REALIZE
        - FPD-NO-CHANGE
        - FPD-RETURN
        - FPD-BLOCK
        - FPD-INVALID
      prohibited_routes: []
      required_artifacts:
        - matching EPG/EPS/EPD/GCR/ASL lineage
        - FPSR policy_result
      success_signals:
        - actual observations are reported without changing the prediction
      failure_signals:
        - driver advances EPS or chooses next policy action
        - stale decision is realized
      rationale: The driver is an evidence-producing actuator, not the policy controller.
    - clause_id: FPD-OBSERVATION-001
      trigger_refs: [FPD-NEW-EVIDENCE]
      expected_routes: [FPD-RETURN, FPD-BLOCK]
      prohibited_routes: [FPD-REALIZE]
      required_artifacts:
        - FPSR-v1 new_observations or prediction_invalidated
      success_signals:
        - mutation stops immediately
      failure_signals:
        - adjacent patch added under stale route/action
      rationale: New evidence changes the problem and returns control upstream.
    - clause_id: FPD-BOUNDARY-001
      trigger_refs: [FPD-POLICY-SLICE, FPD-LEGACY-SLICE, FPD-KERNEL]
      expected_routes:
        - FPD-REALIZE
        - FPD-NO-CHANGE
        - FPD-RETURN
        - FPD-BLOCK
        - FPD-INVALID
      prohibited_routes: []
      required_artifacts:
        - FPSR-v1 construct map
        - surface accounting
        - focused proof
      success_signals:
        - no orphan, scope, or budget violation
      failure_signals:
        - scope expansion
        - proof without obligation coverage
      rationale: Realization is bounded and auditable.
  instrumentation:
    decision_receipt: optional
    rationale: FPSR records the realization result; route selection belongs upstream.
