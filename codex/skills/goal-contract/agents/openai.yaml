policy:
  allow_implicit_invocation: true
interface:
  display_name: "Goal Contract"
  short_description: "Compile /goal intent into outcome, verifier, constraints, modes, authority, and stop rules"
  default_prompt: >-
    Use $goal-contract to produce a compact GC-v1 GoalContract before recursive
    goal work. Bind outcome, verifier, constraints, review policy, authority,
    persistence mode, stop conditions, and human-owned ambiguity. Research
    discoverable facts first and hand off to $grill-me only for material
    user-owned decisions.
