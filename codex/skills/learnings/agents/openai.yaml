interface:
  display_name: "learnings"
  short_description: "Capture, browse, and search execution learnings"
  default_prompt: "Use $learnings to load or capture execution learnings: prefer `recent` or `query` for browsing, `recall` for implementation preflight, and `append` for end-of-turn capture. Finish implementation turns with one proof line: `appended: id=...`, `duplicate-skip: <reason>`, or `0 records appended: <reason>`."
