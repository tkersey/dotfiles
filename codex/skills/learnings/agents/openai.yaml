policy:
  allow_implicit_invocation: true
interface:
  display_name: "Learnings"
  short_description: "Capture and admit evidence-backed learnings"
  default_prompt: "Use $learnings to recall or capture repo-local execution learnings. In a Ledger source-memory checkpoint, evaluate only the Learnings projection, return one canonical and one admission disposition, use native export for accepted admission, and do not invoke the coordinator or a sibling source."
