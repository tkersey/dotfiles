policy:
  allow_implicit_invocation: true
interface:
  display_name: "Goal WorkGraph"
  short_description: "Break a goal contract or Scheme Plan into inspect/edit/verify/review/branch/reuse work items"
  default_prompt: >-
    Use $goal-workgraph to turn a goal contract or Scheme Plan into a small work
    graph. Prefer verifier-first and representative-class-first decomposition;
    group review findings by shared cause; encode bounded parallelism only when
    paths/resources/proof surfaces are safe; choose update_plan, goal-artifacts,
    or external-controller blockers explicitly.
