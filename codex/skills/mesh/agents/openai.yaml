interface:
  display_name: "mesh"
  short_description: "Batch fanout over spawn_agents_on_csv"
  default_prompt: >
    Use $mesh only for already-shaped homogeneous leaf batches over spawn_agents_on_csv.
    Finish planning before the batch starts, make each row independent, provide a clear CSV schema
    plus one instruction template, and require exactly one report_agent_job_result call per worker.
    Keep outputs small and structured, optionally shape them with output_schema, and review the
    exported CSV when the batch completes. If the work is heterogeneous, coupled, or still needs
    debate, design, or decomposition, use $teams or local execution instead.
